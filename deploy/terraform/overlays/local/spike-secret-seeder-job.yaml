apiVersion: batch/v1
kind: Job
metadata:
  name: spike-secret-seeder
  namespace: spike-system
  labels:
    app.kubernetes.io/name: spike-seeder
    app.kubernetes.io/part-of: spike
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spike-seeder
        app.kubernetes.io/part-of: spike
    spec:
      serviceAccountName: spike-seeder
      restartPolicy: Never
      containers:
        - name: spike-seeder
          image: ghcr.io/spiffe/spike-pilot:0.8.0
          command: ['/bin/sh', '-c']
          args:
            - |
              set -eu

              echo 'spike-seeder: waiting for SPIKE Nexus (bootstrap may still be running)...'
              seeded=0
              i=1
              while [ "$i" -le 60 ]; do
                if spike secret put deadbeef value=test-secret-value-12345 >/dev/null 2>&1; then
                  seeded=1
                  break
                fi
                echo "spike-seeder: retry secret put ($i/60)" >&2
                sleep 5
                i=$((i + 1))
              done
              if [ "$seeded" -ne 1 ]; then
                echo 'spike-seeder: FAILED to seed secret ref=deadbeef' >&2
                exit 1
              fi
              echo 'spike-seeder: seeded ref=deadbeef'

              if [ -n "${GROQ_API_KEY:-}" ]; then
                echo 'spike-seeder: seeding groq-api-key'
                groq_seeded=0
                i=1
                while [ "$i" -le 60 ]; do
                  if spike secret put groq-api-key "value=${GROQ_API_KEY}" >/dev/null 2>&1; then
                    groq_seeded=1
                    break
                  fi
                  echo "spike-seeder: retry groq-api-key put ($i/60)" >&2
                  sleep 5
                  i=$((i + 1))
                done
                if [ "$groq_seeded" -eq 1 ]; then
                  echo 'spike-seeder: groq-api-key seeded successfully'
                else
                  echo 'spike-seeder: warning: failed to seed groq-api-key after retries (step-up guard will degrade to fail-open)' >&2
                fi
              else
                echo 'spike-seeder: GROQ_API_KEY not set, skipping guard model key seeding (step-up guard will degrade to fail-open)'
              fi

              echo 'spike-seeder: creating gateway-read ACL policy'
              policy_ok=0
              i=1
              while [ "$i" -le 60 ]; do
                if spike policy create --name=gateway-read \
                  --path-pattern='.*' \
                  --spiffeid-pattern="^spiffe://${SPIKE_TRUST_ROOT}/ns/gateway/sa/.*" \
                  --permissions=read >/dev/null 2>&1; then
                  policy_ok=1
                  break
                fi
                echo "spike-seeder: retry policy create ($i/60)" >&2
                sleep 5
                i=$((i + 1))
              done
              if [ "$policy_ok" -ne 1 ]; then
                echo 'spike-seeder: FAILED to create gateway-read policy' >&2
                exit 1
              fi
              echo 'spike-seeder: done'
          env:
            - name: SPIFFE_ENDPOINT_SOCKET
              value: 'unix:///run/spire/sockets/agent.sock'
            - name: SPIKE_NEXUS_API_URL
              value: 'https://spike-nexus.spike-system.svc.cluster.local:8443'
            - name: SPIKE_TRUST_ROOT
              value: 'precinct.poc'
            - name: SPIKE_TRUST_ROOT_NEXUS
              value: 'precinct.poc'
            - name: SPIKE_TRUST_ROOT_PILOT
              value: 'precinct.poc'
            - name: GROQ_API_KEY
              value: 'demo-guard-key'
          volumeMounts:
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
            - name: spike-bootstrap-state
              mountPath: /etc/spike/bootstrap-state
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
        - name: spike-bootstrap-state
          configMap:
            name: spike-bootstrap-state
