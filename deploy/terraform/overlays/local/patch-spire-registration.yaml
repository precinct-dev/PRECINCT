# ------------------------------------------------------------------------------
# SPIRE Registration Entries Patch -- Local K8s
# Stories: RFA-7bh.1, RFA-38s
#
# Replaces the EKS registration ConfigMap with a local-compatible version
# that uses join_token parent IDs instead of k8s_psat. Docker Desktop
# kubeadm does not have an OIDC provider, so k8s_psat attestation is
# unavailable. The join_token attestor is used instead.
#
# Usage: make k8s-register-spire
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-registration-script
  namespace: spire-system
data:
  register.sh: |
    #!/bin/sh
    # SPIRE workload registration script (Local K8s / join_token attestation).
    #
    # Usage:
    #   make k8s-register-spire   (from POC root)
    #
    # This script runs inside the SPIRE Server pod where the Unix socket
    # is available. It cannot run in a standalone Job because the SPIRE
    # CLI only supports -socketPath (Unix socket), not TCP addresses.
    #
    # Local variant: uses join_token parent IDs (not k8s_psat) because
    # Docker Desktop kubeadm lacks an OIDC provider for PSAT attestation.
    #
    # Idempotent: SPIRE deduplicates entries by SPIFFE ID.

    set -eu
    SOCK="/tmp/spire-server/private/api.sock"

    echo "=== Waiting for SPIRE Server ==="
    until /opt/spire/bin/spire-server healthcheck -socketPath "$SOCK" 2>/dev/null; do
      echo "  Server not ready, retrying in 5s..."
      sleep 5
    done
    echo "SPIRE Server is ready."

    echo ""
    echo "=== Generating join token for SPIRE Agent ==="
    TOKEN=$(/opt/spire/bin/spire-server token generate \
      -socketPath "$SOCK" \
      -spiffeID spiffe://precinct.poc/agent/local \
      -ttl 86400 | grep -oP 'Token: \K.*' || \
      /opt/spire/bin/spire-server token generate \
      -socketPath "$SOCK" \
      -spiffeID spiffe://precinct.poc/agent/local \
      -ttl 86400 | awk '{print $NF}')
    echo "Join token generated."

    echo ""
    echo "=== Registering SPIRE entries ==="

    # Gateway workload
    echo "  Workload: precinct-gateway..."
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://precinct.poc/agent/local \
      -spiffeID spiffe://precinct.poc/ns/gateway/sa/precinct-gateway \
      -selector k8s:ns:gateway \
      -selector k8s:sa:precinct-gateway \
      -dns precinct-gateway \
      -dns precinct-gateway.gateway.svc.cluster.local \
    || echo "  (entry may already exist, continuing)"

    # Control workload
    echo "  Workload: precinct-control..."
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://precinct.poc/agent/local \
      -spiffeID spiffe://precinct.poc/ns/gateway/sa/precinct-control \
      -selector k8s:ns:gateway \
      -selector k8s:sa:precinct-control \
      -dns precinct-control \
      -dns precinct-control.gateway.svc.cluster.local \
    || echo "  (entry may already exist, continuing)"

    # Tool server workloads
    echo "  Workload: mcp-tool (tools namespace)..."
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://precinct.poc/agent/local \
      -spiffeID spiffe://precinct.poc/ns/tools/sa/mcp-tool \
      -selector k8s:ns:tools \
      -selector k8s:sa:mcp-tool \
    || echo "  (entry may already exist, continuing)"

    # SPIKE Nexus workload
    echo "  Workload: spike-nexus..."
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://precinct.poc/agent/local \
      -spiffeID spiffe://precinct.poc/spike/nexus \
      -selector k8s:ns:spike-system \
      -selector k8s:sa:spike-nexus \
      -dns spike-nexus \
      -dns spike-nexus.spike-system.svc.cluster.local \
    || echo "  (entry may already exist, continuing)"

    # SPIKE Keeper 1
    echo "  Workload: spike-keeper..."
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://precinct.poc/agent/local \
      -spiffeID spiffe://precinct.poc/spike/keeper/1 \
      -selector k8s:ns:spike-system \
      -selector k8s:sa:spike-keeper \
      -dns spike-keeper-1 \
      -dns spike-keeper-1.spike-system.svc.cluster.local \
    || echo "  (entry may already exist, continuing)"

    # SPIKE Bootstrap
    echo "  Workload: spike-bootstrap..."
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://precinct.poc/agent/local \
      -spiffeID spiffe://precinct.poc/spike/bootstrap \
      -selector k8s:ns:spike-system \
      -selector k8s:sa:spike-bootstrap \
    || echo "  (entry may already exist, continuing)"

    # SPIKE Secret Seeder (Pilot superuser)
    echo "  Workload: spike-seeder..."
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://precinct.poc/agent/local \
      -spiffeID spiffe://precinct.poc/spike/pilot/role/superuser/seeder \
      -selector k8s:ns:spike-system \
      -selector k8s:sa:spike-seeder \
    || echo "  (entry may already exist, continuing)"

    # OpenSearch workload
    echo "  Workload: opensearch..."
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://precinct.poc/agent/local \
      -spiffeID spiffe://precinct.poc/ns/observability/sa/opensearch \
      -selector k8s:ns:observability \
      -selector k8s:sa:opensearch \
      -dns opensearch \
      -dns opensearch.observability.svc.cluster.local \
    || echo "  (entry may already exist, continuing)"

    # OpenSearch Dashboards workload
    echo "  Workload: opensearch-dashboards..."
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://precinct.poc/agent/local \
      -spiffeID spiffe://precinct.poc/ns/observability/sa/opensearch-dashboards \
      -selector k8s:ns:observability \
      -selector k8s:sa:opensearch-dashboards \
      -dns opensearch-dashboards \
      -dns opensearch-dashboards.observability.svc.cluster.local \
    || echo "  (entry may already exist, continuing)"

    # OpenSearch audit forwarder workload
    echo "  Workload: opensearch-audit-forwarder..."
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://precinct.poc/agent/local \
      -spiffeID spiffe://precinct.poc/ns/observability/sa/opensearch-audit-forwarder \
      -selector k8s:ns:observability \
      -selector k8s:sa:opensearch-audit-forwarder \
    || echo "  (entry may already exist, continuing)"

    echo ""
    echo "=== Current entries ==="
    /opt/spire/bin/spire-server entry show -socketPath "$SOCK"
    echo ""
    echo "Registration complete."
