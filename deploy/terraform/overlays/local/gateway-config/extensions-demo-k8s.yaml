# PRECINCT Extension Registry -- Content Scanner Demo (Kubernetes)
# Configures the content-scanner sidecar in the post_inspection slot.
# Used by K8s: EXTENSION_REGISTRY_PATH=/config/extensions-demo-k8s.yaml
version: "1"
extensions:
  - name: "content_scanner"
    slot: "post_inspection"
    enabled: true
    endpoint: "http://content-scanner.tools.svc.cluster.local:8085/scan"
    timeout_ms: 5000
    fail_mode: "fail_open"
    priority: 100
    description: "Content scanner sidecar for prompt injection, dangerous code, and credential leak detection"
    filters:
      methods: ["tools/call"]
      tools: []
    request_fields:
      include_body: true
      include_spiffe_id: true
      include_tool_name: true
      include_security_flags: true
