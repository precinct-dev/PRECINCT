# Capability Registry V2 (Phase 3)
#
# This registry is enforced by /v1/tool/execute and binds capability IDs to:
# - adapter protocol policy
# - tool allowlists
# - action/resource authorization
# - optional step-up requirements for high-risk operations
#
# K8s and Compose both mount this same file path. Keep it stable and review
# changes as part of controlled RuleOps/PolicyOps lifecycle.
version: v2

capabilities:
  - id: tool.default.mcp
    kind: tool
    protocol: mcp
    server: default
    adapters:
      - mcp
    allowlist:
      - read
      - tavily_search
    action_policies:
      - action: tool.execute
        resources:
          - tool/read
          - tool/search
        allowed_tools:
          - read
          - tavily_search
        require_step_up: false

  - id: tool.highrisk.cli
    kind: tool
    protocol: cli
    server: local
    adapters:
      - cli
    allowlist:
      - bash
    action_policies:
      - action: tool.execute
        resources:
          - tool/write
          - tool/exec
        allowed_tools:
          - bash
        require_step_up: true

  # Example model-plane provider entry (OpenAI-compatible). Not yet enforced.
  - id: model.groq.openai_compat
    kind: model
    protocol: openai
    provider: groq
    endpoint: https://api.groq.com/openai/v1
    residency:
      - us
