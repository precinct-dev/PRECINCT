# ------------------------------------------------------------------------------
# Local-only SPIKE Bootstrap Job
# Keeps Docker Desktop / local K8s demo bootstrap on a single keeper with 1-of-1
# recovery, while release-facing SPIKE manifests require multi-share recovery.
# ------------------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: spike-bootstrap
  namespace: spike-system
  labels:
    app.kubernetes.io/name: spike-bootstrap
    app.kubernetes.io/part-of: spike
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spike-bootstrap
        app.kubernetes.io/part-of: spike
    spec:
      serviceAccountName: spike-bootstrap
      restartPolicy: Never
      containers:
        - name: spike-bootstrap
          image: registry:5000/poc-spike-bootstrap:latest
          args: ['-init']
          env:
            - name: SPIFFE_ENDPOINT_SOCKET
              value: 'unix:///run/spire/sockets/agent.sock'
            - name: SPIKE_NEXUS_API_URL
              value: 'https://spike-nexus.spike-system.svc.cluster.local:8443'
            - name: SPIKE_NEXUS_KEEPER_PEERS
              value: 'https://spike-keeper-1.spike-system.svc.cluster.local:8443'
            - name: SPIKE_NEXUS_SHAMIR_THRESHOLD
              value: '1'
            - name: SPIKE_NEXUS_SHAMIR_SHARES
              value: '1'
            - name: SPIKE_TRUST_ROOT
              value: 'precinct.poc'
            - name: SPIKE_TRUST_ROOT_NEXUS
              value: 'precinct.poc'
            - name: SPIKE_TRUST_ROOT_PILOT
              value: 'precinct.poc'
            - name: SPIKE_TRUST_ROOT_BOOTSTRAP
              value: 'precinct.poc'
            - name: SPIKE_TRUST_ROOT_KEEPER
              value: 'precinct.poc'
            - name: SPIKE_TRUST_ROOT_LITE_WORKLOAD
              value: 'precinct.poc'
            - name: SPIKE_SYSTEM_LOG_LEVEL
              value: 'DEBUG'
          volumeMounts:
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
