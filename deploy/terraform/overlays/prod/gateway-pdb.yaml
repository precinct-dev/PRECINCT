# ------------------------------------------------------------------------------
# Gateway Pod Disruption Budget (Production)
# Story: RFA-9fv.6
#
# Ensures at least 2 gateway replicas are available during voluntary
# disruptions (node drains, upgrades, etc.).
# ------------------------------------------------------------------------------
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: precinct-gateway
  namespace: gateway
  labels:
    app.kubernetes.io/name: precinct-gateway
    app.kubernetes.io/part-of: precinct-gateway
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: precinct-gateway
