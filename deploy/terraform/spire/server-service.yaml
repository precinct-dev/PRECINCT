# ------------------------------------------------------------------------------
# SPIRE Server Services
# Story: RFA-9fv.3
#
# Two services:
#   1. Headless service (for StatefulSet stable DNS: spire-server-{0,1}.spire-server)
#   2. ClusterIP service (for agent -> server gRPC connectivity)
# ------------------------------------------------------------------------------
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: spire-server
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-server
    app.kubernetes.io/part-of: spire
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: spire-server
  ports:
    - name: grpc
      port: 8081
      targetPort: grpc
      protocol: TCP
---
# ClusterIP service for agent connectivity
apiVersion: v1
kind: Service
metadata:
  name: spire-server-api
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-server
    app.kubernetes.io/part-of: spire
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spire-server
  ports:
    - name: grpc
      port: 8081
      targetPort: grpc
      protocol: TCP
    - name: health
      port: 8080
      targetPort: health
      protocol: TCP
