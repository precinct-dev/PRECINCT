# ------------------------------------------------------------------------------
# SPIRE Server Configuration (ConfigMap)
# Story: RFA-9fv.3
#
# Adapted from config/spire/server.conf for Kubernetes:
#   - Trust domain: precinct.poc
#   - k8s_psat NodeAttestor (replaces join_token for EKS)
#   - SQLite3 data store (sufficient for POC)
#   - OIDC Discovery enabled for federation via EKS OIDC provider
#   - Health checks enabled for liveness/readiness probes
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-server-config
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-server
    app.kubernetes.io/part-of: spire
data:
  server.conf: |
    server {
        bind_address = "0.0.0.0"
        bind_port = "8081"
        socket_path = "/tmp/spire-server/private/api.sock"
        trust_domain = "precinct.poc"
        data_dir = "/opt/spire/data"
        log_level = "INFO"

        # CA configuration
        ca_ttl = "24h"
        default_x509_svid_ttl = "1h"
        default_jwt_svid_ttl = "5m"
    }

    plugins {
        DataStore "sql" {
            plugin_data {
                database_type = "sqlite3"
                connection_string = "/opt/spire/data/datastore.sqlite3"
            }
        }

        # Kubernetes Projected Service Account Token attestor.
        # Uses the EKS OIDC provider to verify node identity.
        NodeAttestor "k8s_psat" {
            plugin_data {
                clusters = {
                    "precinct-poc" = {
                        # The service_account_allow_list restricts which service
                        # accounts can attest as SPIRE agents.
                        service_account_allow_list = ["spire-system:spire-agent"]
                    }
                }
            }
        }

        KeyManager "disk" {
            plugin_data {
                keys_path = "/opt/spire/data/keys.json"
            }
        }

        # Notifier for Kubernetes bundles -- pushes trust bundles
        # to a ConfigMap readable by workloads.
        Notifier "k8sbundle" {
            plugin_data {
                namespace = "spire-system"
                config_map = "spire-bundle"
            }
        }
    }

    health_checks {
        listener_enabled = true
        bind_address = "0.0.0.0"
        bind_port = "8080"
        live_path = "/live"
        ready_path = "/ready"
    }
