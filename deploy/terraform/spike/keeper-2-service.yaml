# ------------------------------------------------------------------------------
# SPIKE Keeper 2 Service
# Release-facing multi-share recovery service for keeper instance 2.
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: spike-keeper-2
  namespace: spike-system
  labels:
    app.kubernetes.io/name: spike-keeper
    app.kubernetes.io/part-of: spike
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spike-keeper
    app.kubernetes.io/instance: keeper-2
  ports:
    - name: https
      port: 8443
      targetPort: https
      protocol: TCP
