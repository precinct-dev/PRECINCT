# ------------------------------------------------------------------------------
# OpenTelemetry Collector ConfigMap
# Story: RFA-9fv.7
#
# Collector configuration adapted from POC/config/otel-collector.yaml for EKS.
# Key differences from Docker Compose:
#   - Phoenix endpoint uses Kubernetes service DNS name
#   - Resource attributes include k8s namespace and cluster info
#   - Health check extension for liveness/readiness probes
#
# Pipeline:
#   receivers (otlp gRPC+HTTP) -> processors (batch, resource) -> exporters (Phoenix)
#
# The gateway sends traces via OTLP gRPC to the collector. The collector batches
# and forwards to Phoenix for visualization and analysis.
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: mcp-observability
    app.kubernetes.io/component: collector
data:
  otel-collector-config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024

      # Add resource attributes for observability context
      resource:
        attributes:
          - key: service.namespace
            value: agentic-security-poc
            action: upsert
          - key: deployment.environment
            value: eks-poc
            action: upsert

    exporters:
      # Export to Phoenix for trace visualization via OTLP gRPC
      otlp_grpc/phoenix:
        endpoint: phoenix.observability.svc.cluster.local:4317
        tls:
          insecure: true

      # Debug logging (set to basic in production)
      debug:
        verbosity: basic

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlp_grpc/phoenix, debug]

        metrics:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlp_grpc/phoenix, debug]

        logs:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlp_grpc/phoenix, debug]

      telemetry:
        logs:
          level: info
