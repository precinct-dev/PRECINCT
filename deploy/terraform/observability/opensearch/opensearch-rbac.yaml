# ------------------------------------------------------------------------------
# OpenSearch ServiceAccounts
#
# SPIFFE IDs expected via SPIRE registration:
#   - spiffe://precinct.poc/ns/observability/sa/opensearch
#   - spiffe://precinct.poc/ns/observability/sa/opensearch-dashboards
#   - spiffe://precinct.poc/ns/observability/sa/opensearch-audit-forwarder
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensearch
  namespace: observability
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: mcp-observability
    app.kubernetes.io/component: search
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensearch-dashboards
  namespace: observability
  labels:
    app.kubernetes.io/name: opensearch-dashboards
    app.kubernetes.io/part-of: mcp-observability
    app.kubernetes.io/component: dashboards
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opensearch-audit-forwarder
  namespace: observability
  labels:
    app.kubernetes.io/name: opensearch-audit-forwarder
    app.kubernetes.io/part-of: mcp-observability
    app.kubernetes.io/component: audit-forwarder
