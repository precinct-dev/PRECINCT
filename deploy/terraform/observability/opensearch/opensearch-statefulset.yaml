# ------------------------------------------------------------------------------
# OpenSearch StatefulSet (TLS + mTLS enforced)
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: observability
  labels:
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/part-of: mcp-observability
    app.kubernetes.io/component: search
spec:
  serviceName: opensearch-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/part-of: mcp-observability
        app.kubernetes.io/component: search
    spec:
      serviceAccountName: opensearch
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-spire-socket
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              i=1
              while [ "$i" -le 60 ]; do
                if [ -S /run/spire/sockets/agent.sock ]; then
                  exit 0
                fi
                sleep 1
                i=$((i + 1))
              done
              echo "SPIRE Workload API socket not found after 60s" >&2
              exit 1
          volumeMounts:
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.15.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: https-api
              containerPort: 9200
              protocol: TCP
            - name: metrics
              containerPort: 9600
              protocol: TCP
          env:
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-admin-credentials
                  key: password
                  optional: false
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: SPIFFE_ENDPOINT_SOCKET
              value: "unix:///run/spire/sockets/agent.sock"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - curl -ksSf https://localhost:9200/_cluster/health >/dev/null
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - curl -ksSf https://localhost:9200/_cluster/health >/dev/null
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 750m
              memory: 2Gi
          volumeMounts:
            - name: opensearch-config
              mountPath: /usr/share/opensearch/config/opensearch.yml
              subPath: opensearch.yml
              readOnly: true
            - name: opensearch-node-tls
              mountPath: /usr/share/opensearch/config/tls
              readOnly: true
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: opensearch-config
          configMap:
            name: opensearch-config
            items:
              - key: opensearch.yml
                path: opensearch.yml
            optional: false
        - name: opensearch-node-tls
          secret:
            secretName: opensearch-node-tls
            optional: false
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
  volumeClaimTemplates:
    - metadata:
        name: opensearch-data
        labels:
          app.kubernetes.io/name: opensearch
          app.kubernetes.io/part-of: mcp-observability
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
