# ------------------------------------------------------------------------------
# Kustomize: sigstore/policy-controller
# Story: RFA-7bh.2
#
# Deploys sigstore/policy-controller as a ValidatingAdmissionWebhook for
# cosign image signature verification. Complementary to OPA Gatekeeper.
#
# Components:
#   - Namespace (cosign-system)
#   - ServiceAccount + RBAC
#   - Deployment + Service (webhook server)
#   - ValidatingWebhookConfiguration
#   - ClusterImagePolicy CRDs (signature requirements)
#   - TLS Secret (cert for webhook HTTPS)
#
# Usage:
#   kustomize build deploy/terraform/admission/policy-controller/
#   kubectl apply -k deploy/terraform/admission/policy-controller/
#
# Reference Architecture Section 10.5.1: Supply Chain Beyond Model Weights
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - tls-secret.yaml
  - webhook.yaml
  - cluster-image-policy.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: sigstore-policy-controller
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
