# ------------------------------------------------------------------------------
# ServiceAccount + RBAC for sigstore/policy-controller
# Story: RFA-7bh.2
#
# The policy-controller needs cluster-wide read access to:
#   - Pods (to inspect image references during admission)
#   - ClusterImagePolicy CRDs (to read policy configuration)
#   - Secrets (to read cosign verification keys if using key-based signing)
#
# It also needs write access to:
#   - Events (to record admission decisions)
#
# Reference Architecture Section 10.5.1: Supply Chain Beyond Model Weights
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: policy-controller
  namespace: cosign-system
  labels:
    app.kubernetes.io/name: policy-controller
    app.kubernetes.io/part-of: sigstore-policy-controller
---
# ClusterRole: permissions needed by policy-controller webhook
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: policy-controller
  labels:
    app.kubernetes.io/name: policy-controller
    app.kubernetes.io/part-of: sigstore-policy-controller
rules:
  # Read pods and replicasets for image resolution
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  # Read ClusterImagePolicy CRDs
  - apiGroups: ["policy.sigstore.dev"]
    resources: ["clusterimagepolicies", "trustroots"]
    verbs: ["get", "list", "watch"]
  # Read secrets (for cosign key references)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Write events for admission decisions
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Read configmaps for leader election and configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update"]
  # Coordination for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update"]
---
# Bind ClusterRole to ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: policy-controller
  labels:
    app.kubernetes.io/name: policy-controller
    app.kubernetes.io/part-of: sigstore-policy-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: policy-controller
subjects:
  - kind: ServiceAccount
    name: policy-controller
    namespace: cosign-system
