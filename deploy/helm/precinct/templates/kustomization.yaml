{{/*
This template renders a kustomization.yaml that selects the appropriate
overlay based on .Values.global.environment. The post-renderer script
(post-renderer/kustomize-render.sh) uses this to run kustomize build
against the correct overlay directory.
*/}}
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../k8s/overlays/{{ .Values.global.environment }}
