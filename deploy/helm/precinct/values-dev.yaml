# ------------------------------------------------------------------------------
# Dev Environment Values
#
# Single-replica deployments, ClusterIP exposure, debug logging,
# dev image tags, lower resource limits.
# Matches deploy/k8s/overlays/dev/ kustomize overlay.
# ------------------------------------------------------------------------------

global:
  environment: dev
  trustDomain: precinct.poc
  imageRegistry: ghcr.io/OWNER/precinct

gateway:
  replicas: 1
  image:
    repository: ghcr.io/OWNER/precinct/precinct-gateway
    tag: dev
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  env:
    logLevel: debug
    spiffeMode: dev
    enforcementProfile: dev
  service:
    type: ClusterIP
    port: 9090

services:
  mcpServer:
    replicas: 1

security:
  podSecurityStandards: privileged

admissionControl:
  gatekeeper:
    enforcementAction: dryrun
  sigstore:
    enabled: false
