# ------------------------------------------------------------------------------
# OpenTelemetry Collector Deployment
# Cloud-agnostic Kubernetes manifest -- works on any conformant cluster.
#
# Deploys the OTEL Collector (contrib distribution) into the observability
# namespace. The collector receives traces, metrics, and logs from the gateway
# via OTLP gRPC/HTTP and forwards them to Phoenix for visualization.
#
# Key design decisions:
#   - Single replica for POC (scale via HPA for production)
#   - ConfigMap-mounted collector configuration
#   - Health check extension on :13133 for liveness/readiness probes
#   - Non-root, restricted security context
#   - Resource limits appropriate for POC workloads
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: mcp-observability
    app.kubernetes.io/component: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: mcp-observability
        app.kubernetes.io/component: collector
    spec:
      serviceAccountName: otel-collector
      terminationGracePeriodSeconds: 15
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          args:
            - "--config=/etc/otel-collector/otel-collector-config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: collector-config
              mountPath: /etc/otel-collector
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: collector-config
          configMap:
            name: otel-collector-config
            items:
              - key: otel-collector-config.yaml
                path: otel-collector-config.yaml
            optional: false
