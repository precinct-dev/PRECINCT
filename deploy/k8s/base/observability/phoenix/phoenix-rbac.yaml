# ------------------------------------------------------------------------------
# Phoenix ServiceAccount
# Cloud-agnostic Kubernetes manifest -- works on any conformant cluster.
#
# ServiceAccount for the Phoenix trace viewer. No cloud-specific annotations
# needed since Phoenix only receives and stores traces internally.
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: phoenix
  namespace: observability
  labels:
    app.kubernetes.io/name: phoenix
    app.kubernetes.io/part-of: mcp-observability
    app.kubernetes.io/component: trace-viewer
