services:
  # Strict runtime hardening override for the gateway surface.
  # Use with:
  #   docker compose --profile strict -f docker-compose.yml -f docker-compose.strict.yml up -d
  # This override intentionally replaces inherited dev/demo listener + env state
  # from docker-compose.yml so the strict render is HTTPS-only.
  # Release-facing SPIKE multi-share recovery is supplied by
  # docker-compose.prod-intent.yml, which adds keeper-2/3 and overrides the
  # Shamir settings for that topology.
  precinct-gateway:
    profiles:
      - strict
    ports: !override
      - "9443:9443"
    environment: !override
      OPA_POLICY_DIR: /config/opa
      TOOL_REGISTRY_CONFIG_PATH: /config/tool-registry.yaml
      CAPABILITY_REGISTRY_V2_PATH: /config/capability-registry-v2.yaml
      MODEL_PROVIDER_CATALOG_PATH: /config/model-provider-catalog.v2.yaml
      MAX_REQUEST_SIZE_BYTES: "10485760"
      SPIFFE_MODE: prod
      ENFORCEMENT_PROFILE: prod_standard
      SPIFFE_TRUST_DOMAIN: poc.local
      SPIFFE_LISTEN_PORT: "9443"
      SPIFFE_ENDPOINT_SOCKET: unix:///tmp/spire-agent/public/api.sock
      LOG_LEVEL: info
      SPIRE_AGENT_SOCKET: /tmp/spire-agent/public/api.sock
      AUDIT_LOG_PATH: /tmp/audit.jsonl
      SPIKE_NEXUS_URL: https://spike-nexus:8443
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: precinct-gateway
      KEYDB_URL: ""
      MCP_TRANSPORT_MODE: mcp
      ENFORCE_MODEL_MEDIATION_GATE: "true"
      MODEL_POLICY_INTENT_PREPEND_ENABLED: "true"
      DEEP_SCAN_TIMEOUT: "${DEEP_SCAN_TIMEOUT:-5}"
      DEEP_SCAN_FALLBACK: "${DEEP_SCAN_FALLBACK:-fail_closed}"
      GUARD_MODEL_NAME: "${GUARD_MODEL_NAME:-}"
      DLP_INJECTION_POLICY: "${DLP_INJECTION_POLICY:-}"
      DLP_PII_POLICY: "${DLP_PII_POLICY:-block}"
      RATE_LIMIT_RPM: "${RATE_LIMIT_RPM:-60}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-10}"
      UPSTREAM_URL: "${STRICT_UPSTREAM_URL:?STRICT_UPSTREAM_URL must be set for strict profile}"
      APPROVAL_SIGNING_KEY: "${APPROVAL_SIGNING_KEY:?APPROVAL_SIGNING_KEY must be set for strict profile}"
      ADMIN_AUTHZ_ALLOWED_SPIFFE_IDS: "${ADMIN_AUTHZ_ALLOWED_SPIFFE_IDS:?ADMIN_AUTHZ_ALLOWED_SPIFFE_IDS must be set for strict profile}"
      UPSTREAM_AUTHZ_ALLOWED_SPIFFE_IDS: "${UPSTREAM_AUTHZ_ALLOWED_SPIFFE_IDS:?UPSTREAM_AUTHZ_ALLOWED_SPIFFE_IDS must be set for strict profile}"
      KEYDB_AUTHZ_ALLOWED_SPIFFE_IDS: "${KEYDB_AUTHZ_ALLOWED_SPIFFE_IDS:?KEYDB_AUTHZ_ALLOWED_SPIFFE_IDS must be set for strict profile}"
      TOOL_REGISTRY_PUBLIC_KEY: /config/attestation-ed25519.pub
      MODEL_PROVIDER_CATALOG_PUBLIC_KEY: /config/attestation-ed25519.pub
      GUARD_ARTIFACT_PATH: /config/guard-artifact.bin
      GUARD_ARTIFACT_SHA256: 8232540100ebde3b5682c2b47d1eee50764f6dadca3842400157061656fc95a3
      GUARD_ARTIFACT_SIGNATURE_PATH: /config/guard-artifact.bin.sig
      GUARD_ARTIFACT_PUBLIC_KEY: /config/attestation-ed25519.pub

  precinct-control:
    profiles:
      - strict
    environment: !override
      OPA_POLICY_DIR: /config/opa
      TOOL_REGISTRY_CONFIG_PATH: /config/tool-registry.yaml
      CAPABILITY_REGISTRY_V2_PATH: /config/capability-registry-v2.yaml
      MODEL_PROVIDER_CATALOG_PATH: /config/model-provider-catalog.v2.yaml
      MAX_REQUEST_SIZE_BYTES: "10485760"
      SPIFFE_MODE: prod
      ENFORCEMENT_PROFILE: prod_standard
      SPIFFE_TRUST_DOMAIN: poc.local
      SPIFFE_LISTEN_PORT: "9443"
      SPIFFE_ENDPOINT_SOCKET: unix:///tmp/spire-agent/public/api.sock
      LOG_LEVEL: info
      SPIRE_AGENT_SOCKET: /tmp/spire-agent/public/api.sock
      AUDIT_LOG_PATH: /tmp/audit.jsonl
      SPIKE_NEXUS_URL: https://spike-nexus:8443
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_SERVICE_NAME: precinct-control
      KEYDB_URL: ""
      MCP_TRANSPORT_MODE: mcp
      ENFORCE_MODEL_MEDIATION_GATE: "true"
      MODEL_POLICY_INTENT_PREPEND_ENABLED: "true"
      DEEP_SCAN_TIMEOUT: "${DEEP_SCAN_TIMEOUT:-5}"
      DEEP_SCAN_FALLBACK: "${DEEP_SCAN_FALLBACK:-fail_closed}"
      GUARD_MODEL_NAME: "${GUARD_MODEL_NAME:-}"
      DLP_INJECTION_POLICY: "${DLP_INJECTION_POLICY:-}"
      DLP_PII_POLICY: "${DLP_PII_POLICY:-block}"
      RATE_LIMIT_RPM: "${RATE_LIMIT_RPM:-60}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-10}"
      UPSTREAM_URL: "${STRICT_UPSTREAM_URL:?STRICT_UPSTREAM_URL must be set for strict profile}"
      APPROVAL_SIGNING_KEY: "${APPROVAL_SIGNING_KEY:?APPROVAL_SIGNING_KEY must be set for strict profile}"
      ADMIN_AUTHZ_ALLOWED_SPIFFE_IDS: "${ADMIN_AUTHZ_ALLOWED_SPIFFE_IDS:?ADMIN_AUTHZ_ALLOWED_SPIFFE_IDS must be set for strict profile}"
      UPSTREAM_AUTHZ_ALLOWED_SPIFFE_IDS: "${UPSTREAM_AUTHZ_ALLOWED_SPIFFE_IDS:?UPSTREAM_AUTHZ_ALLOWED_SPIFFE_IDS must be set for strict profile}"
      KEYDB_AUTHZ_ALLOWED_SPIFFE_IDS: "${KEYDB_AUTHZ_ALLOWED_SPIFFE_IDS:?KEYDB_AUTHZ_ALLOWED_SPIFFE_IDS must be set for strict profile}"
      TOOL_REGISTRY_PUBLIC_KEY: /config/attestation-ed25519.pub
      MODEL_PROVIDER_CATALOG_PUBLIC_KEY: /config/attestation-ed25519.pub
      GUARD_ARTIFACT_PATH: /config/guard-artifact.bin
      GUARD_ARTIFACT_SHA256: 8232540100ebde3b5682c2b47d1eee50764f6dadca3842400157061656fc95a3
      GUARD_ARTIFACT_SIGNATURE_PATH: /config/guard-artifact.bin.sig
      GUARD_ARTIFACT_PUBLIC_KEY: /config/attestation-ed25519.pub
