services:
  openclaw:
    build:
      context: ../../../openclaw
      dockerfile: Dockerfile
    container_name: openclaw
    hostname: openclaw
    depends_on:
      precinct-gateway:
        condition: service_healthy
    networks:
      - agentic-net
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan", "--port", "18789"]
    environment:
      - GROQ_API_KEY=spike:ref:groq-api-key
      - OPENAI_API_KEY=spike:ref:groq-api-key
    volumes:
      - ./data/openclaw-config:/home/node/.openclaw
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    labels:
      - "spiffe-id=openclaw"
      - "component=agent"

networks:
  agentic-net:
    external: true
    name: agentic-security-network
