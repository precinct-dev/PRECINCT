# ------------------------------------------------------------------------------
# Envoy Sidecar Configuration for Demo -- No SPIRE SDS Required
#
# Simplified version of envoy-sidecar.yaml that works without SPIRE.
# Uses the Lua filter to inject X-SPIFFE-ID from the SPIFFE_ID env var.
# SDS/TLS cluster removed for demo simplicity.
#
# Architecture:
#   [curl client] --> envoy-sidecar:10000 --> precinct-gateway:9090
#
# The listener binds 0.0.0.0 (not 127.0.0.1) so a companion container
# on the same Docker network can reach the sidecar by service name.
# ------------------------------------------------------------------------------

node:
  id: sidecar-proxy-demo
  cluster: precinct-sidecar-demo

static_resources:
  listeners:
    - name: demo_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: sidecar_http
                codec_type: AUTO
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: gateway_backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: precinct_gateway
                            timeout: 30s
                http_filters:
                  # Lua filter injects SPIFFE identity header from environment.
                  # In dev mode, the gateway trusts X-SPIFFE-ID headers.
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(request_handle)
                            local spiffe_id = os.getenv("SPIFFE_ID")
                            if spiffe_id and spiffe_id ~= "" then
                              request_handle:headers():add("X-SPIFFE-ID", spiffe_id)
                            end
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: precinct_gateway
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: precinct_gateway
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: precinct-gateway
                      port_value: 9090

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
