name: Security Scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gosec:
    name: Gosec (Go Source)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec ./...

  trivy-fs:
    name: Trivy (Filesystem)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            aquasec/trivy:latest \
            fs \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --no-progress \
            --skip-dirs .beads \
            .

  trivy-image:
    name: Trivy (Gateway Image)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build gateway image
        run: docker build -f deploy/compose/Dockerfile.gateway -t mcp-security-gateway:ci .

      - name: Run Trivy image scan
        run: |
          docker run --rm \
            aquasec/trivy:latest \
            image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --no-progress \
            mcp-security-gateway:ci
