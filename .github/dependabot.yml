version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/POC"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/POC"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/POC/tools/compliance"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
