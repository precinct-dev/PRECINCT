name: Release Gate CI

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -count=1 -timeout 180s ./...

  opa-test:
    name: opa-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa && sudo mv opa /usr/local/bin/
      - run: make test-opa

  readiness-gates:
    name: readiness-gates
    runs-on: ubuntu-latest
    needs: [lint, test, opa-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run strict runtime validation
        run: make strict-runtime-validate
      - name: Run production readiness validation
        run: make production-readiness-validate
      - name: Upload readiness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: readiness-gates
          path: tests/e2e/artifacts/

  demo-compose-gate:
    name: demo-compose-gate
    runs-on: ubuntu-latest
    needs: [lint, test, opa-test]
    steps:
      - uses: actions/checkout@v4
      - name: Start phoenix stack
        run: make phoenix-up
      - name: Run compose demo
        run: make demo-compose
      - name: Upload demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-compose-gate
          path: tests/e2e/artifacts/

  k8s-policy-gate:
    name: k8s-policy-gate
    runs-on: ubuntu-latest
    needs: [lint, test, opa-test]
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
      - name: Run k8s validate
        run: make k8s-validate

  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest
    needs: [lint, test, opa-test, readiness-gates, demo-compose-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        env:
          REPO: ${{ github.repository }}
        run: |
          docker build -t "ghcr.io/${REPO}/precinct-gateway:${GITHUB_SHA}" .
          docker push "ghcr.io/${REPO}/precinct-gateway:${GITHUB_SHA}"
