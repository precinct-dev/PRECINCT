# ------------------------------------------------------------------------------
# CI Pipeline - Build, Test, Strict Readiness Gates, Demo Coverage, Sign, Push
# Stories: RFA-9fv.6, RFA-l6h6.8.4
#
# Manual-only workflow_dispatch to avoid automatic CI spend.
# Steps:
#   1. Lint Go code (go vet + staticcheck)
#   2. Run Go unit tests (gateway, middleware, tools, s3-mcp-server)
#   3. Run OPA policy tests
#   4. Enforce strict readiness/security evidence parity gates (PR required)
#   5. Run demo-compose parity coverage (PR required)
#   6. Run k8s manifest validation gate on manual policy runs
#   7. Build container images (gateway, s3-mcp-server)
#   8. Generate SBOMs (syft)
#   9. Sign images with cosign (keyless OIDC)
#  10. Push to GHCR (only on main/epic branches, not PRs from forks)
# ------------------------------------------------------------------------------
name: CI

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/agentic-ref-arch
  GO_VERSION: "1.24"

permissions:
  contents: read
  packages: write
  id-token: write  # Required for cosign keyless OIDC signing

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Lint
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: POC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: POC/go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

  # --------------------------------------------------------------------------
  # Job 2: Unit Tests
  # --------------------------------------------------------------------------
  test:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: POC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: POC/go.sum

      - name: Run unit tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic \
            ./internal/gateway/... \
            ./internal/gateway/middleware/... \
            ./internal/tools/...
          go test -v -race ./tests/unit/...
          go test -v -race ./tests/integration/...

      - name: Run S3 MCP server tests
        run: |
          if [ -d "./cmd/s3-mcp-server" ]; then
            go test -v -race ./cmd/s3-mcp-server/...
          fi
          if [ -d "./internal/s3mcp" ]; then
            go test -v -race ./internal/s3mcp/...
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: POC/coverage.out
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # Job 3: OPA Policy Tests
  # --------------------------------------------------------------------------
  opa-test:
    name: OPA Policy Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: POC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
          opa version

      - name: Run OPA policy tests
        run: |
          opa test config/opa/ -v \
            --bundle \
            -d config/opa/tool_grants.yaml \
            -d config/opa/tool_registry.yaml \
            -d config/opa/ui_capability_grants.yaml

  # --------------------------------------------------------------------------
  # Job 4: Strict readiness parity gate (manual)
  # --------------------------------------------------------------------------
  readiness-gates:
    name: Readiness Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: POC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install readiness tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          curl -sSfL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/kustomize
          curl -sfL "https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh" | sudo sh -s -- -b /usr/local/bin v0.58.1
          kustomize version
          trivy --version

      - name: Strict runtime + production readiness validation
        run: |
          mkdir -p build/ci
          make strict-runtime-validate | tee build/ci/strict-runtime-validate.log
          make production-readiness-validate | tee build/ci/production-readiness-validate.log

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: readiness-gates
          path: |
            POC/build/ci/strict-runtime-validate.log
            POC/build/ci/production-readiness-validate.log
            POC/build/security-scan/latest/**
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # Job 5: Compose demo parity gate (manual)
  # --------------------------------------------------------------------------
  demo-compose-gate:
    name: Demo Compose Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: POC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Execute compose demo parity path
        run: |
          mkdir -p build/ci
          make phoenix-up | tee build/ci/phoenix-up.log
          make demo-compose | tee build/ci/demo-compose.log

      - name: Capture compose diagnostics
        if: always()
        run: |
          docker compose ps > build/ci/docker-compose-ps.log || true
          docker compose logs --timestamps > build/ci/docker-compose-logs.log || true

      - name: Upload demo artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: demo-compose-gate
          path: |
            POC/build/ci/phoenix-up.log
            POC/build/ci/demo-compose.log
            POC/build/ci/docker-compose-ps.log
            POC/build/ci/docker-compose-logs.log
            POC/tests/e2e/artifacts/**
          if-no-files-found: warn

      - name: Teardown compose/phoenix stacks
        if: always()
        run: |
          make down || true
          make phoenix-down || true

  # --------------------------------------------------------------------------
  # Job 6: K8s validation policy gate (manual)
  # --------------------------------------------------------------------------
  k8s-validation-policy-gate:
    name: K8s Validation Policy Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: POC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sSfL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Run K8s manifest policy validation
        run: |
          mkdir -p build/ci
          make k8s-validate | tee build/ci/k8s-validate.log

      - name: Upload K8s policy gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k8s-validation-policy-gate
          path: POC/build/ci/k8s-validate.log
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # Job 7: Build, SBOM, Sign, Push
  # --------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, test, opa-test, readiness-gates, demo-compose-gate]
    strategy:
      matrix:
        include:
          - image: mcp-security-gateway
            dockerfile: POC/docker/Dockerfile.gateway
            context: POC
          - image: s3-mcp-server
            dockerfile: POC/docker/Dockerfile.s3-mcp-server
            context: POC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate referenced paths exist
        run: |
          test -f "${{ matrix.dockerfile }}"
          test -d "${{ matrix.context }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/epic/') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # -- SBOM Generation (standalone, in addition to BuildKit SBOM) --
      - name: Install syft
        if: github.event_name == 'push'
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        if: github.event_name == 'push'
        run: |
          syft \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}@${{ steps.build.outputs.digest }} \
            -o spdx-json > sbom-${{ matrix.image }}.spdx.json

      - name: Upload SBOM
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.spdx.json

      # -- Image Signing with Cosign (keyless OIDC) --
      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}@${DIGEST}

      - name: Attach SBOM to image
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attach sbom \
            --sbom sbom-${{ matrix.image }}.spdx.json \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}@${DIGEST}
