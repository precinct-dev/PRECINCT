# ------------------------------------------------------------------------------
# Promotion Pipeline - dev -> staging -> prod
# Story: RFA-9fv.6
#
# Manual trigger (workflow_dispatch) to promote container images between
# environments. Verifies image signatures before promotion and updates
# Kustomize overlay image digests.
#
# Flow:
#   1. Verify source image signature with cosign
#   2. Re-tag image for target environment
#   3. Sign the promoted image
#   4. Update Kustomize overlay with new image digest
#   5. Validate the rendered target overlay against digest policy semantics
#   6. Commit overlay change (optional, controlled by input)
# ------------------------------------------------------------------------------
name: Promote

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: "Source environment"
        required: true
        type: choice
        options:
          - dev
          - staging
      target_env:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod
      image:
        description: "Image to promote"
        required: true
        type: choice
        options:
          - mcp-security-gateway
          - s3-mcp-server
      source_tag:
        description: "Source image tag or digest (e.g., sha-abc1234 or sha256:...)"
        required: true
        type: string
      commit_overlay:
        description: "Commit Kustomize overlay update"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/agentic-ref-arch
  # Source image signer constraints: only allow images signed by this repository's
  # CI workflow on main or epic/* branches.
  SOURCE_CERT_IDENTITY_REGEX: ^https://github.com/${{ github.repository }}/.github/workflows/ci.yaml@refs/heads/(main|epic/.+)$
  SOURCE_CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com

permissions:
  contents: write   # For committing overlay updates
  packages: write   # For pushing re-tagged images
  id-token: write   # For cosign keyless signing

jobs:
  validate-promotion:
    name: Validate Promotion Path
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion path
        run: |
          SOURCE="${{ inputs.source_env }}"
          TARGET="${{ inputs.target_env }}"

          # Enforce promotion order: dev -> staging -> prod
          if [ "$SOURCE" = "dev" ] && [ "$TARGET" = "prod" ]; then
            echo "ERROR: Cannot promote directly from dev to prod. Must go through staging."
            exit 1
          fi
          if [ "$SOURCE" = "staging" ] && [ "$TARGET" = "dev" ]; then
            echo "ERROR: Cannot demote from staging to dev."
            exit 1
          fi
          if [ "$SOURCE" = "$TARGET" ]; then
            echo "ERROR: Source and target environments must be different."
            exit 1
          fi

          echo "Promotion path validated: $SOURCE -> $TARGET"

  promote:
    name: Promote Image
    runs-on: ubuntu-latest
    needs: [validate-promotion]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          # Fetch full history for committing overlay changes
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Install kustomize
        run: |
          curl -sSfL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Resolve source image reference
        id: source_ref
        env:
          INPUT_SOURCE_TAG: ${{ inputs.source_tag }}
        run: |
          SOURCE_BASE="${REGISTRY}/${IMAGE_PREFIX}/${{ inputs.image }}"
          if [[ "${INPUT_SOURCE_TAG}" == *@sha256:* ]]; then
            SOURCE_IMAGE="${INPUT_SOURCE_TAG}"
          elif [[ "${INPUT_SOURCE_TAG}" == sha256:* ]]; then
            SOURCE_IMAGE="${SOURCE_BASE}@${INPUT_SOURCE_TAG}"
          else
            SOURCE_IMAGE="${SOURCE_BASE}:${INPUT_SOURCE_TAG}"
          fi
          echo "Resolved source image: ${SOURCE_IMAGE}"
          echo "source_image=${SOURCE_IMAGE}" >> "${GITHUB_OUTPUT}"

      - name: Verify source image signature
        env:
          SOURCE_IMAGE: ${{ steps.source_ref.outputs.source_image }}
          COSIGN_EXPERIMENTAL: "1"
          SOURCE_CERT_IDENTITY_REGEX: ${{ env.SOURCE_CERT_IDENTITY_REGEX }}
          SOURCE_CERT_OIDC_ISSUER: ${{ env.SOURCE_CERT_OIDC_ISSUER }}
        run: |
          echo "Verifying signature on source image: ${SOURCE_IMAGE}"
          cosign verify \
            --certificate-identity-regexp="${SOURCE_CERT_IDENTITY_REGEX}" \
            --certificate-oidc-issuer="${SOURCE_CERT_OIDC_ISSUER}" \
            "${SOURCE_IMAGE}"
          echo "Signature verification PASSED"

      - name: Copy image to target tag
        env:
          SOURCE_IMAGE: ${{ steps.source_ref.outputs.source_image }}
          TARGET_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.image }}:${{ inputs.target_env }}
        run: |
          echo "Copying ${SOURCE_IMAGE} -> ${TARGET_IMAGE}"
          crane copy "${SOURCE_IMAGE}" "${TARGET_IMAGE}"

          # Get the digest of the promoted image
          DIGEST=$(crane digest "${TARGET_IMAGE}")
          echo "Promoted image digest: ${DIGEST}"
          echo "PROMOTED_DIGEST=${DIGEST}" >> "$GITHUB_ENV"

      - name: Sign promoted image
        env:
          TARGET_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.image }}:${{ inputs.target_env }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            "${TARGET_IMAGE}@${PROMOTED_DIGEST}"
          echo "Promoted image signed successfully"

      - name: Update Kustomize overlay
        env:
          TARGET_ENV: ${{ inputs.target_env }}
          IMAGE_NAME: ${{ inputs.image }}
          FULL_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.image }}
        run: |
          OVERLAY_DIR="POC/infra/eks/overlays/${TARGET_ENV}"
          if [ ! -d "${OVERLAY_DIR}" ]; then
            echo "WARNING: Overlay directory ${OVERLAY_DIR} does not exist. Skipping overlay update."
            exit 0
          fi

          case "${IMAGE_NAME}" in
            mcp-security-gateway)
              OVERLAY_IMAGE_NAME="mcp-security-gateway"
              ;;
            s3-mcp-server)
              OVERLAY_IMAGE_NAME="python"
              ;;
            *)
              echo "ERROR: Unsupported overlay image mapping for ${IMAGE_NAME}"
              exit 1
              ;;
          esac

          (
            cd "${OVERLAY_DIR}"
            kustomize edit set image "${OVERLAY_IMAGE_NAME}=${FULL_IMAGE}@${PROMOTED_DIGEST}"
          )

          KUSTOMIZATION="${OVERLAY_DIR}/kustomization.yaml"
          echo "Updated ${KUSTOMIZATION} with digest ${PROMOTED_DIGEST}"
          cat "${KUSTOMIZATION}"

      - name: Validate rendered target overlay
        env:
          TARGET_ENV: ${{ inputs.target_env }}
        run: |
          make -C POC k8s-overlay-digest-validate OVERLAYS="${TARGET_ENV}"

      - name: Commit overlay update
        if: inputs.commit_overlay
        env:
          TARGET_ENV: ${{ inputs.target_env }}
          IMAGE_NAME: ${{ inputs.image }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          OVERLAY_DIR="POC/infra/eks/overlays/${TARGET_ENV}"
          if git diff --quiet "${OVERLAY_DIR}"; then
            echo "No changes to commit"
            exit 0
          fi

          git add "${OVERLAY_DIR}/"
          git commit -m "chore(promote): ${IMAGE_NAME} -> ${TARGET_ENV} (${PROMOTED_DIGEST})"
          git push
