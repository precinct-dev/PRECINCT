# OpenTelemetry Collector config for the standalone Phoenix stack (RFA-80d)
#
# This config is used by the otel-collector in docker-compose.phoenix.yml.
# It resolves "phoenix" within the phoenix-observability-network.
# The main stack's gateway sends OTLP to otel-collector:4317 via the shared network.

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Add resource attributes for better observability
  resource:
    attributes:
      - key: service.namespace
        value: agentic-security-poc
        action: upsert

exporters:
  # Export to Phoenix for trace visualization
  otlp_grpc/phoenix:
    endpoint: phoenix:4317
    tls:
      insecure: true

  # Debug logging for development
  debug:
    verbosity: detailed

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp_grpc/phoenix, debug]

    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp_grpc/phoenix, debug]

    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp_grpc/phoenix, debug]

  telemetry:
    logs:
      level: info
