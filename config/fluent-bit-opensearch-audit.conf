[SERVICE]
    Flush                 2
    Daemon                Off
    Log_Level             info
    storage.path          /fluent-bit/state/storage
    storage.sync          normal
    storage.checksum      off

[INPUT]
    Name                  tail
    Tag                   precinct.audit
    Path                  /audit/audit.jsonl
    Parser                json
    Read_from_Head        true
    Refresh_Interval      2
    Mem_Buf_Limit         20MB
    Skip_Long_Lines       On
    DB                    /fluent-bit/state/precinct-audit.db
    DB.Sync               Normal

[FILTER]
    Name                  grep
    Match                 precinct.audit
    Regex                 decision_id .+

[FILTER]
    Name                  record_modifier
    Match                 precinct.audit
    Record                telemetry_backend opensearch
    Record                source precinct-gateway-audit-jsonl

[OUTPUT]
    Name                  opensearch
    Match                 precinct.audit
    Host                  opensearch
    Port                  9200
    Suppress_Type_Name    On
    Generate_ID           On
    Replace_Dots          On
    Logstash_Format       On
    Logstash_Prefix       precinct-audit
    Retry_Limit           False
