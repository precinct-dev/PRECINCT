agent {
    data_dir = "/opt/spire/data/agent"
    log_level = "DEBUG"
    server_address = "spire-server"
    server_port = "8081"
    socket_path = "/tmp/spire-agent/public/api.sock"
    trust_domain = "poc.local"

    # Insecure bootstrap for POC only
    insecure_bootstrap = true
}

plugins {
    NodeAttestor "x509pop" {
        plugin_data {
            private_key_path = "/opt/spire/conf/agent/x509pop-agent.key"
            certificate_path = "/opt/spire/conf/agent/x509pop-agent.crt"
        }
    }

    KeyManager "disk" {
        plugin_data {
            directory = "/opt/spire/data/agent"
        }
    }

    # Docker workload attestor - identifies workloads by container properties.
    # use_new_container_locator is required for cgroupv2 (Docker Desktop, modern Linux).
    WorkloadAttestor "docker" {
        plugin_data {
            use_new_container_locator = true
        }
    }

    # Unix workload attestor for processes
    WorkloadAttestor "unix" {
        plugin_data {}
    }
}

health_checks {
    listener_enabled = true
    bind_address = "0.0.0.0"
    bind_port = "8080"
    live_path = "/live"
    ready_path = "/ready"
}
