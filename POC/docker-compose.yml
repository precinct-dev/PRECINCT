# Docker MCP Server Integration:
# The Docker MCP server is managed externally by Docker Desktop's MCP Toolkit.
# It is NOT defined in this compose file. Configuration lives in ~/.docker/mcp/
# and is accessed by the gateway via JSON-RPC at http://localhost:8081/mcp
# when the Docker MCP Gateway is running in streaming mode.
#
# To start Docker MCP Gateway:
#   docker mcp gateway run --port 8081 --transport streaming
#
# For details, see: POC/docs/docker-mcp-integration.md

services:
  # SPIRE Server - Identity control plane for workload attestation
  spire-server:
    image: ghcr.io/spiffe/spire-server:1.10.0
    container_name: spire-server
    hostname: spire-server
    volumes:
      - ./config/spire/server.conf:/opt/spire/conf/server/server.conf:ro
      - ./data/spire-server:/opt/spire/data
      - spire-server-socket:/tmp/spire-server
    ports:
      - "18081:8081"  # gRPC API for agent registration (host 18081 -> container 8081)
      - "18080:8080"  # Health check endpoint (host 18080 -> container 8080)
    command: ["-config", "/opt/spire/conf/server/server.conf"]
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agentic-net

  # SPIRE Token Generator - One-shot init service to generate fresh join tokens
  spire-token-generator:
    build:
      context: .
      dockerfile: build/docker/Dockerfile.token-generator
    image: spire-token-generator:latest
    container_name: spire-token-generator
    depends_on:
      spire-server:
        condition: service_healthy
    volumes:
      - spire-server-socket:/tmp/spire-server:ro
      - spire-join-token:/token
    networks:
      - agentic-net
    restart: "no"  # Run once and exit

  # SPIRE Agent - Workload attestation agent with Docker attestor
  spire-agent:
    build:
      context: .
      dockerfile: build/docker/Dockerfile.spire-agent
    image: spire-agent-wrapper:latest
    container_name: spire-agent
    hostname: spire-agent
    depends_on:
      spire-server:
        condition: service_healthy
      spire-token-generator:
        condition: service_completed_successfully
    volumes:
      - ./config/spire/agent.conf:/opt/spire/conf/agent/agent.conf:ro
      - ./data/spire-agent:/opt/spire/data/agent
      - spire-agent-socket:/tmp/spire-agent/public
      - spire-join-token:/token:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Required for Docker workload attestor
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-agent", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agentic-net
    # Privileged mode required for Docker socket access
    privileged: true

  # SPIKE Nexus - Late-binding secrets vault with SPIFFE mTLS (RFA-a2y.1)
  # Provides token-based secret redemption so agents never see raw credentials.
  # Docker Compose Tier 1: in-memory root key (lost on restart, acceptable for POC per ADR-001).
  spike-nexus:
    image: ghcr.io/spiffe/spike-nexus:0.8.0
    container_name: spike-nexus
    hostname: spike-nexus
    depends_on:
      spire-agent:
        condition: service_healthy
    volumes:
      - spire-agent-socket:/tmp/spire-agent/public:ro
    ports:
      - "8443:8443"  # HTTPS API
    environment:
      - SPIKE_NEXUS_MODE=token
      - SPIKE_NEXUS_ADDR=:8443
      - SPIKE_NEXUS_TRUST_DOMAIN=poc.local
      - SPIFFE_ENDPOINT_SOCKET=unix:///tmp/spire-agent/public/api.sock
    networks:
      - agentic-net
    labels:
      - "spiffe-id=spike-nexus"
      - "component=secrets"
      - "service=spike"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "-k", "https://localhost:8443/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # SPIKE Bootstrap - One-shot init container to generate and deliver root key to Nexus (RFA-a2y.1)
  spike-bootstrap:
    image: ghcr.io/spiffe/spike-nexus:0.8.0
    container_name: spike-bootstrap
    depends_on:
      spike-nexus:
        condition: service_healthy
    volumes:
      - spire-agent-socket:/tmp/spire-agent/public:ro
    environment:
      - SPIFFE_ENDPOINT_SOCKET=unix:///tmp/spire-agent/public/api.sock
      - SPIKE_NEXUS_ADDR=https://spike-nexus:8443
    command: ["spike", "init"]
    networks:
      - agentic-net
    labels:
      - "spiffe-id=spike-bootstrap"
    restart: "no"

  # KeyDB - Redis-compatible session persistence store (RFA-hh5.1)
  # Enables cross-request exfiltration detection by persisting session context
  # across HTTP requests. BSD-3-Clause licensed.
  #
  # RFA-8z8.2: In SPIFFE_MODE=prod, KeyDB also listens on TLS port 6380 using
  # SPIRE-issued X.509 SVIDs written to /certs/ by keydb-svid-init. The gateway
  # connects via rediss://keydb:6380 with mTLS.
  # In SPIFFE_MODE=dev (default), only port 6379 is used (no TLS).
  keydb:
    image: eqalpha/keydb:latest
    container_name: keydb
    hostname: keydb
    ports:
      - "6379:6379"    # Plain Redis protocol (dev mode)
      - "6380:6380"    # TLS Redis protocol (prod mode, RFA-8z8.2)
    volumes:
      - keydb-data:/data
      - keydb-certs:/certs:ro      # RFA-8z8.2: SVID PEM files from keydb-svid-init
    networks:
      - agentic-net
    labels:
      - "spiffe-id=keydb"          # RFA-8z8.2: SPIRE workload attestation
      - "component=session-store"
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # KeyDB SVID Init - One-shot init container to fetch SPIRE SVID for KeyDB TLS (RFA-8z8.2)
  # KeyDB cannot speak the SPIRE Workload API natively. This container fetches
  # the X.509 SVID from SPIRE Agent and writes PEM files to a shared volume.
  # KeyDB then uses these PEM files for its TLS listener on port 6380.
  #
  # In SPIFFE_MODE=dev, this service is defined but KeyDB ignores the certs
  # (it only listens on plain port 6379). The init runs harmlessly.
  keydb-svid-init:
    image: ghcr.io/spiffe/spire-agent:1.10.0
    container_name: keydb-svid-init
    depends_on:
      spire-agent:
        condition: service_healthy
    volumes:
      - spire-agent-socket:/tmp/spire-agent/public:ro
      - keydb-certs:/certs
      - ./scripts/keydb-svid-refresh.sh:/usr/local/bin/keydb-svid-refresh.sh:ro
    environment:
      - SPIFFE_ENDPOINT_SOCKET=unix:///tmp/spire-agent/public/api.sock
      - CERT_DIR=/certs
    entrypoint: ["/bin/sh", "-c", "/usr/local/bin/keydb-svid-refresh.sh init"]
    networks:
      - agentic-net
    labels:
      - "spiffe-id=keydb"
    restart: "no"

  # OpenTelemetry Collector - Observability data pipeline
  #
  # RFA-8z8.2 AC4: EXPLICIT mTLS EXCEPTION. The OTel Collector receives telemetry
  # data (spans, metrics) over plain HTTP/gRPC. It does NOT require mTLS because:
  # 1. It never receives or transmits secrets (only observability data)
  # 2. Telemetry data is not sensitive under SOC 2 CC6.6 / ISO 27001 A.13.1.1
  # 3. Adding mTLS to the telemetry pipeline adds latency to every span export
  # This exception is documented in ADR-003 and verified in tcpdump tests.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    hostname: otel-collector
    volumes:
      - ./config/otel-collector.yaml:/etc/otel-collector-config.yaml:ro
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"  # OTLP gRPC receiver (plain, no TLS -- see mTLS exception above)
      - "4318:4318"  # OTLP HTTP receiver (plain, no TLS -- see mTLS exception above)
    depends_on:
      phoenix:
        condition: service_healthy
    networks:
      - agentic-net
    # Health provided by health_check extension on :13133 (configured in otel-collector.yaml).
    # No Docker healthcheck defined: the otel-collector-contrib image is FROM scratch and
    # lacks wget/curl/shell for a Docker HEALTHCHECK command. The gateway depends on this
    # service with condition: service_started (not service_healthy) for this reason.

  # Phoenix - Trace visualization and analysis
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    hostname: phoenix
    ports:
      - "6006:6006"  # Phoenix UI
    expose:
      - "4317"  # Phoenix gRPC (OTLP) - internal only, otel-collector connects via docker network
    environment:
      - PHOENIX_PORT=6006
      - PHOENIX_HOST=0.0.0.0
      - PHOENIX_GRPC_PORT=4317
    networks:
      - agentic-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6006/')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MCP Security Gateway - Security enforcement point for all MCP requests
  mcp-security-gateway:
    build:
      context: .
      dockerfile: build/docker/Dockerfile.gateway
    image: mcp-security-gateway:latest
    container_name: mcp-security-gateway
    hostname: mcp-security-gateway
    depends_on:
      spire-agent:
        condition: service_healthy
      keydb:
        condition: service_healthy
      otel-collector:
        condition: service_started  # service_started (not service_healthy) because the
                                    # otel-collector-contrib image is FROM scratch and has
                                    # no shell/curl/wget for a Docker healthcheck.
                                    # The OTel gRPC exporter uses lazy connection with
                                    # automatic retries, so startup ordering is sufficient.
    volumes:
      - spire-agent-socket:/tmp/spire-agent/public:ro  # SPIRE agent socket mounted read-only
      - ./config:/config:ro  # Mount config directory for OPA policies and tool registry
    ports:
      - "9090:9090"   # MCP JSON-RPC API (HTTP, dev mode)
      - "9443:9443"   # MCP JSON-RPC API (HTTPS/mTLS, prod mode) (RFA-8z8.1)
    environment:
      - PORT=9090
      - UPSTREAM_URL=http://host.docker.internal:8081/mcp
      - OPA_POLICY_DIR=/config/opa
      - TOOL_REGISTRY_CONFIG_PATH=/config/tool-registry.yaml
      - MAX_REQUEST_SIZE_BYTES=10485760
      - SPIFFE_MODE=dev
      - SPIFFE_TRUST_DOMAIN=poc.local
      - SPIFFE_LISTEN_PORT=9443
      - SPIFFE_ENDPOINT_SOCKET=unix:///tmp/spire-agent/public/api.sock
      - LOG_LEVEL=info
      - SPIRE_AGENT_SOCKET=/tmp/spire-agent/public/api.sock
      - AUDIT_LOG_PATH=/tmp/audit.jsonl
      - SPIKE_NEXUS_URL=https://spike-nexus:8443
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=mcp-security-gateway
      - KEYDB_URL=redis://keydb:6379  # RFA-hh5.1: KeyDB session persistence (auto-converts to rediss://keydb:6380 in prod mode per RFA-8z8.2)
      - MCP_TRANSPORT_MODE=${MCP_TRANSPORT_MODE:-mcp}  # RFA-5u9: "mcp" (default) or "proxy" (backward compat reverse proxy)
    networks:
      - agentic-net
    labels:
      - "spiffe-id=mcp-security-gateway"
      - "component=gateway"
    healthcheck:
      test: ["CMD", "/app/gateway", "health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  agentic-net:
    driver: bridge
    name: agentic-security-network

volumes:
  # SPIRE Server persistent data
  spire-server-data:
    name: spire-server-data

  # SPIRE Server socket (for registration API)
  spire-server-socket:
    name: spire-server-socket

  # SPIRE Agent persistent data
  spire-agent-data:
    name: spire-agent-data

  # SPIRE Agent socket - SHARED with gateway for workload attestation
  spire-agent-socket:
    name: spire-agent-socket

  # SPIRE Join Token - Temporary volume for passing fresh join tokens from generator to agent
  spire-join-token:
    name: spire-join-token

  # KeyDB persistent data (RFA-hh5.1)
  keydb-data:
    name: keydb-data

  # KeyDB SVID certificates (RFA-8z8.2) - shared between keydb-svid-init and keydb
  keydb-certs:
    name: keydb-certs
