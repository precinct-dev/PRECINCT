# Standalone Phoenix Observability Stack (RFA-80d)
#
# Decoupled from the main docker-compose.yml so Phoenix persists across
# demo stack teardowns. Traces survive `make down` and are available for
# analysis across multiple demo runs.
#
# Usage:
#   make phoenix-up     # Start Phoenix + OTel collector
#   make phoenix-down   # Stop (preserves trace data)
#   make phoenix-reset  # Stop + destroy trace data
#
# Phoenix UI: http://localhost:6006

services:
  # Phoenix - Trace visualization and analysis (persistent)
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    hostname: phoenix
    ports:
      - "6006:6006"  # Phoenix UI
    expose:
      - "4317"  # Phoenix gRPC (OTLP) - internal only, otel-collector connects via docker network
    environment:
      - PHOENIX_PORT=6006
      - PHOENIX_HOST=0.0.0.0
      - PHOENIX_GRPC_PORT=4317
      - PHOENIX_WORKING_DIR=/data
    volumes:
      - phoenix-data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6006/')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phoenix-net

  # OpenTelemetry Collector - Receives OTLP from gateway, forwards to Phoenix
  #
  # EXPLICIT mTLS EXCEPTION (carried from main stack):
  # The OTel Collector receives telemetry data (spans, metrics) over plain gRPC/HTTP.
  # It does NOT require mTLS because telemetry data is not sensitive.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    hostname: otel-collector
    volumes:
      - ./config/otel-collector-phoenix.yaml:/etc/otel-collector-config.yaml:ro
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"  # OTLP gRPC receiver (exposed to host + shared network)
      - "4318:4318"  # OTLP HTTP receiver
    depends_on:
      phoenix:
        condition: service_healthy
    networks:
      - phoenix-net
    # No Docker healthcheck: otel-collector-contrib image is FROM scratch (no shell/curl).
    # Health provided by health_check extension on :13133 (configured in otel-collector-phoenix.yaml).

networks:
  phoenix-net:
    driver: bridge
    name: phoenix-observability-network

volumes:
  phoenix-data:
    name: phoenix-data
