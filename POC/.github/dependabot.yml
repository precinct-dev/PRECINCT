version: 2
updates:
  # Go modules - weekly updates
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "go"
    assignees:
      - "@repository-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 10

  # Docker base images - weekly updates
  - package-ecosystem: "docker"
    directory: "/build/docker"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
    labels:
      - "dependencies"
      - "docker"
    assignees:
      - "@repository-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 5

  # GitHub Actions - weekly updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
    labels:
      - "dependencies"
      - "github-actions"
    assignees:
      - "@repository-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 5
