# ------------------------------------------------------------------------------
# Tools Namespace
# Cloud-agnostic Kubernetes manifest -- works on any conformant cluster.
#
# Dedicated namespace for MCP tool servers. In the POC, this hosts a
# placeholder MCP server for testing. Future tool servers deploy here.
#
# The "name: tools" label is required by NetworkPolicy namespaceSelector rules
# that control which namespaces can receive traffic from the gateway.
#
# SPIFFE ID for workloads: spiffe://agentic-ref-arch.poc/ns/tools/sa/mcp-tool
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: tools
  labels:
    app.kubernetes.io/part-of: mcp-tools
    # Opt-in namespace for sigstore/policy-controller admission interception.
    policy.sigstore.dev/include: "true"
    # Label used by NetworkPolicy namespaceSelector for ingress rules
    name: tools
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
