# ------------------------------------------------------------------------------
# Kustomize Dev Overlay
# Story: RFA-9fv.6
#
# Development environment configuration:
#   - 1 replica for gateway, 1 for MCP server
#   - Debug logging enabled
#   - Dev image tags
#   - Lower resource limits
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

# Namespace override is NOT used here because base manifests have explicit
# namespaces (gateway, tools). Cross-namespace resources require explicit names.

images:
  - name: mcp-security-gateway
    newName: ghcr.io/OWNER/agentic-ref-arch/mcp-security-gateway
    newTag: dev  # mcp-security-gateway
  - name: python  # placeholder MCP server image
    newName: python
    newTag: "3.12-slim"

patches:
  # Gateway: 1 replica, debug logging
  - target:
      kind: Deployment
      name: mcp-security-gateway
      namespace: gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-security-gateway
        namespace: gateway
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: mcp-security-gateway
                env:
                  - name: LOG_LEVEL
                    value: "debug"
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 200m
                    memory: 128Mi

  # MCP Server: 1 replica
  - target:
      kind: Deployment
      name: mcp-server
      namespace: tools
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-server
        namespace: tools
      spec:
        replicas: 1

commonAnnotations:
  app.kubernetes.io/environment: dev
