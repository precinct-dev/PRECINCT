# ------------------------------------------------------------------------------
# Kustomize Staging Overlay
# Story: RFA-9fv.6
#
# Staging environment configuration:
#   - 2 replicas for gateway (test HA)
#   - 1 replica for MCP server
#   - Standard (info) logging
#   - Staging image tags (promoted from dev via promote.yaml)
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

images:
  - name: mcp-security-gateway
    newName: ghcr.io/OWNER/agentic-ref-arch/mcp-security-gateway
    newTag: staging  # mcp-security-gateway
  - name: python  # placeholder MCP server image
    newName: python
    newTag: "3.12-slim"

patches:
  # Gateway: 2 replicas, info logging
  - target:
      kind: Deployment
      name: mcp-security-gateway
      namespace: gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-security-gateway
        namespace: gateway
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: mcp-security-gateway
                env:
                  - name: LOG_LEVEL
                    value: "info"
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 256Mi

  # MCP Server: 1 replica
  - target:
      kind: Deployment
      name: mcp-server
      namespace: tools
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-server
        namespace: tools
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: mcp-server
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 300m
                    memory: 256Mi

commonAnnotations:
  app.kubernetes.io/environment: staging
