# ------------------------------------------------------------------------------
# Kustomize Staging Overlay
# Stories: RFA-9fv.6, RFA-tv9
#
# Staging environment configuration:
#   - 2 replicas for gateway (test HA)
#   - 1 replica for MCP server
#   - Standard (info) logging
#   - Staging image tags (promoted from dev via promote.yaml)
#   - Admission control with cert-manager TLS for policy-controller
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base
  - gateway-runtime-secrets.yaml
  # Admission control (OPA Gatekeeper + sigstore/policy-controller)
  - ../../admission
  # cert-manager TLS auto-generation for policy-controller webhook (RFA-tv9)
  - ../../admission/policy-controller/cert-manager

images:
  - name: mcp-security-gateway
    newName: ghcr.io/OWNER/agentic-ref-arch/mcp-security-gateway
    newTag: staging  # mcp-security-gateway
  - name: python  # placeholder MCP server image
    newName: python
    newTag: "3.12-slim"

patches:
  # --------------------------------------------------------------------------
  # cert-manager CA injection for policy-controller webhook TLS (RFA-tv9)
  # cert-manager's CA injector reads this annotation and populates caBundle
  # with the CA that signed the Certificate in cosign-system.
  # --------------------------------------------------------------------------
  - target:
      kind: ValidatingWebhookConfiguration
      name: policy-controller-validating
    patch: |
      apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingWebhookConfiguration
      metadata:
        name: policy-controller-validating
        annotations:
          cert-manager.io/inject-ca-from: cosign-system/policy-controller-webhook-cert

  # Gateway: 2 replicas, info logging
  - target:
      kind: Deployment
      name: mcp-security-gateway
      namespace: gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-security-gateway
        namespace: gateway
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: mcp-security-gateway
                env:
                  - name: LOG_LEVEL
                    value: "info"
                  - name: ENFORCEMENT_PROFILE
                    value: "prod_standard"
                  - name: MCP_TRANSPORT_MODE
                    value: "mcp"
                  - name: SPIFFE_MODE
                    value: "prod"
                  - name: UPSTREAM_URL
                    value: "https://mcp-server.tools.svc.cluster.local:8081/mcp"
                  - name: APPROVAL_SIGNING_KEY
                    valueFrom:
                      secretKeyRef:
                        name: gateway-runtime-secrets
                        key: approval_signing_key
                  - name: UPSTREAM_AUTHZ_ALLOWED_SPIFFE_IDS
                    value: "spiffe://agentic-ref-arch.poc/ns/tools/sa/mcp-tool"
                  - name: KEYDB_AUTHZ_ALLOWED_SPIFFE_IDS
                    value: "spiffe://agentic-ref-arch.poc/ns/data/sa/keydb"
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 256Mi

  # MCP Server: 1 replica
  - target:
      kind: Deployment
      name: mcp-server
      namespace: tools
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-server
        namespace: tools
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: mcp-server
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 300m
                    memory: 256Mi

commonAnnotations:
  app.kubernetes.io/environment: staging
