# Capability Registry v2 (Phase 3 placeholder)
#
# This file is mounted into the gateway Pod at /config/capability-registry-v2.yaml
# by the local Kustomize overlay. The gateway accepts a v2 registry path today,
# but enforcement is intentionally minimal while Phase 3 evolves.
#
# Note: This is a deliberate copy rather than a reference to POC/config/ to
# avoid kustomize path restrictions. Keep in sync with:
#   POC/config/capability-registry-v2.yaml
version: v2

capabilities:
  - id: tool.mcp.default
    kind: tool
    protocol: mcp
    server: default
    allowlist:
      - tavily_search

  - id: model.groq.openai_compat
    kind: model
    protocol: openai
    provider: groq
    endpoint: https://api.groq.com/openai/v1
    residency:
      - us
