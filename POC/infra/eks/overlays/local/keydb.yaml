# ------------------------------------------------------------------------------
# KeyDB for Local K8s
# Story: RFA-7bh.1
#
# Deploys KeyDB (Redis-compatible) in the data namespace for session
# persistence and distributed rate limiting. This matches the Docker Compose
# KeyDB service configuration.
#
# In EKS, KeyDB would use an ElastiCache cluster or EBS-backed PVC.
# For local K8s, we use a single-replica Deployment with emptyDir storage
# (data is ephemeral -- acceptable for local development).
#
# Resource limits are reduced to fit on a laptop (4 CPU, 8GB RAM).
# ------------------------------------------------------------------------------

# Data namespace for stateful services
apiVersion: v1
kind: Namespace
metadata:
  name: data
  labels:
    app.kubernetes.io/part-of: mcp-data
    name: data
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
# KeyDB Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keydb
  namespace: data
  labels:
    app.kubernetes.io/name: keydb
    app.kubernetes.io/part-of: mcp-data
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keydb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keydb
        app.kubernetes.io/part-of: mcp-data
        app.kubernetes.io/component: cache
    spec:
      terminationGracePeriodSeconds: 10
      securityContext:
        # KeyDB image runs as UID 1001 in the bitnami image
        fsGroup: 1001
      containers:
        - name: keydb
          image: bitnami/keydb:latest
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            # Allow passwordless access for local development
            - name: ALLOW_EMPTY_PASSWORD
              value: "yes"
          livenessProbe:
            exec:
              command:
                - keydb-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - keydb-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: keydb-data
              mountPath: /bitnami/keydb/data
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        # Ephemeral storage for local dev (data lost on pod restart)
        - name: keydb-data
          emptyDir:
            sizeLimit: 100Mi
---
# KeyDB Service
apiVersion: v1
kind: Service
metadata:
  name: keydb
  namespace: data
  labels:
    app.kubernetes.io/name: keydb
    app.kubernetes.io/part-of: mcp-data
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: keydb
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
