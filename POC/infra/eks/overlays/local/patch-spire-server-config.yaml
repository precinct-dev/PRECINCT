# ------------------------------------------------------------------------------
# SPIRE Server Config Patch -- Local K8s (join_token attestor)
# Story: RFA-7bh.1
#
# Replaces the k8s_psat NodeAttestor with join_token for Docker Desktop kubeadm.
# Docker Desktop's kubeadm cluster does not provide an OIDC provider, so
# k8s_psat attestation (which requires a TokenReview API backed by an OIDC
# issuer) is not available. The join_token attestor uses pre-shared tokens
# generated by the spire-token-generator Job at deploy time.
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-server-config
  namespace: spire-system
data:
  server.conf: |
    server {
        bind_address = "0.0.0.0"
        bind_port = "8081"
        socket_path = "/tmp/spire-server/private/api.sock"
        trust_domain = "agentic-ref-arch.poc"
        data_dir = "/opt/spire/data"
        log_level = "DEBUG"

        # CA configuration (same as EKS)
        ca_ttl = "24h"
        default_x509_svid_ttl = "1h"
        default_jwt_svid_ttl = "5m"
    }

    plugins {
        DataStore "sql" {
            plugin_data {
                database_type = "sqlite3"
                connection_string = "/opt/spire/data/datastore.sqlite3"
            }
        }

        # join_token attestor for local K8s (replaces k8s_psat).
        # Agents attest using a pre-shared token generated by the
        # spire-token-generator Job.
        NodeAttestor "join_token" {
            plugin_data {}
        }

        KeyManager "disk" {
            plugin_data {
                keys_path = "/opt/spire/data/keys.json"
            }
        }

        # Notifier for Kubernetes bundles
        Notifier "k8sbundle" {
            plugin_data {
                namespace = "spire-system"
                config_map = "spire-bundle"
            }
        }
    }

    health_checks {
        listener_enabled = true
        bind_address = "0.0.0.0"
        bind_port = "8080"
        live_path = "/live"
        ready_path = "/ready"
    }
