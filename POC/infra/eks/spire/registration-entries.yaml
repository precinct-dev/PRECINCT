# ------------------------------------------------------------------------------
# SPIRE Registration Entries (Job)
# Story: RFA-9fv.3
#
# Creates workload registration entries in the SPIRE Server using the CLI.
# Runs as a Kubernetes Job after the SPIRE Server is healthy.
#
# SPIFFE ID Scheme:
#   spiffe://agentic-ref-arch.poc/ns/<namespace>/sa/<service-account>
#
# Registered workloads:
#   1. mcp-security-gateway -- the security enforcement gateway
#   2. tools/* -- MCP tool server workloads (wildcard-like via namespace selector)
#   3. spike-nexus -- SPIKE token service
#
# Re-running this job is idempotent: SPIRE deduplicates entries by SPIFFE ID.
# ------------------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: spire-register-entries
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-register
    app.kubernetes.io/part-of: spire
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-register
    spec:
      serviceAccountName: spire-server
      restartPolicy: OnFailure
      containers:
        - name: register
          image: ghcr.io/spiffe/spire-server:1.10.0
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              # Wait for SPIRE Server to be ready
              echo "Waiting for SPIRE Server to be ready..."
              until /opt/spire/bin/spire-server healthcheck \
                -socketPath /tmp/spire-server/private/api.sock; do
                echo "  Server not ready, retrying in 5s..."
                sleep 5
              done
              echo "SPIRE Server is ready."

              # ----------------------------------------------------------------
              # Node entry: allow agents attested via k8s_psat
              # ----------------------------------------------------------------
              echo "Registering node entry for SPIRE agents..."
              /opt/spire/bin/spire-server entry create \
                -socketPath /tmp/spire-server/private/api.sock \
                -node \
                -spiffeID spiffe://agentic-ref-arch.poc/agent/k8s-psat \
                -selector k8s_psat:cluster:agentic-ref-arch-poc \
                -selector k8s_psat:agent_ns:spire-system \
                -selector k8s_psat:agent_sa:spire-agent \
              || echo "  (entry may already exist, continuing)"

              # ----------------------------------------------------------------
              # Workload: mcp-security-gateway
              # ----------------------------------------------------------------
              echo "Registering gateway workload..."
              /opt/spire/bin/spire-server entry create \
                -socketPath /tmp/spire-server/private/api.sock \
                -parentID spiffe://agentic-ref-arch.poc/agent/k8s-psat \
                -spiffeID spiffe://agentic-ref-arch.poc/ns/gateway/sa/mcp-security-gateway \
                -selector k8s:ns:gateway \
                -selector k8s:sa:mcp-security-gateway \
                -dns mcp-security-gateway \
                -dns mcp-security-gateway.gateway.svc.cluster.local \
              || echo "  (entry may already exist, continuing)"

              # ----------------------------------------------------------------
              # Workload: MCP tool servers (tools namespace)
              # Each tool server in the "tools" namespace with the "mcp-tool"
              # service account gets an SVID.
              # ----------------------------------------------------------------
              echo "Registering tool server workloads..."
              /opt/spire/bin/spire-server entry create \
                -socketPath /tmp/spire-server/private/api.sock \
                -parentID spiffe://agentic-ref-arch.poc/agent/k8s-psat \
                -spiffeID spiffe://agentic-ref-arch.poc/ns/tools/sa/mcp-tool \
                -selector k8s:ns:tools \
                -selector k8s:sa:mcp-tool \
              || echo "  (entry may already exist, continuing)"

              # ----------------------------------------------------------------
              # Workload: SPIKE Nexus
              # ----------------------------------------------------------------
              echo "Registering SPIKE Nexus workload..."
              /opt/spire/bin/spire-server entry create \
                -socketPath /tmp/spire-server/private/api.sock \
                -parentID spiffe://agentic-ref-arch.poc/agent/k8s-psat \
                -spiffeID spiffe://agentic-ref-arch.poc/ns/spike-system/sa/spike-nexus \
                -selector k8s:ns:spike-system \
                -selector k8s:sa:spike-nexus \
                -dns spike-nexus \
                -dns spike-nexus.spike-system.svc.cluster.local \
              || echo "  (entry may already exist, continuing)"

              echo ""
              echo "=== All registration entries ==="
              /opt/spire/bin/spire-server entry show \
                -socketPath /tmp/spire-server/private/api.sock
              echo ""
              echo "Registration complete."
          volumeMounts:
            # The job needs access to the SPIRE Server socket.
            # This is mounted from the server pod -- in practice this job
            # runs on the same node or uses the gRPC API service.
            # For POC simplicity, we connect via the server's socket directory.
            - name: spire-server-socket
              mountPath: /tmp/spire-server/private
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        # NOTE: In a real deployment, this job would use the gRPC API
        # (spire-server-api:8081) instead of the Unix socket. For POC
        # simplicity, we document that the job should be run after
        # port-forwarding or from within the server pod.
        # Alternative: use kubectl exec to run these commands in the server pod.
        - name: spire-server-socket
          emptyDir: {}
---
# Alternative: ConfigMap with registration script for kubectl exec approach
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-registration-script
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-register
    app.kubernetes.io/part-of: spire
data:
  register.sh: |
    #!/bin/sh
    # Run this inside the SPIRE Server pod:
    #   kubectl exec -n spire-system spire-server-0 -- sh /opt/spire/conf/register.sh
    #
    # Or use the deploy-spire-entries Makefile target which does this automatically.

    set -eu
    SOCK="/tmp/spire-server/private/api.sock"

    echo "=== Registering SPIRE entries ==="

    # Node entry for k8s_psat agents
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -node \
      -spiffeID spiffe://agentic-ref-arch.poc/agent/k8s-psat \
      -selector k8s_psat:cluster:agentic-ref-arch-poc \
      -selector k8s_psat:agent_ns:spire-system \
      -selector k8s_psat:agent_sa:spire-agent \
    || true

    # Gateway workload
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://agentic-ref-arch.poc/agent/k8s-psat \
      -spiffeID spiffe://agentic-ref-arch.poc/ns/gateway/sa/mcp-security-gateway \
      -selector k8s:ns:gateway \
      -selector k8s:sa:mcp-security-gateway \
      -dns mcp-security-gateway \
      -dns mcp-security-gateway.gateway.svc.cluster.local \
    || true

    # Tool server workloads
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://agentic-ref-arch.poc/agent/k8s-psat \
      -spiffeID spiffe://agentic-ref-arch.poc/ns/tools/sa/mcp-tool \
      -selector k8s:ns:tools \
      -selector k8s:sa:mcp-tool \
    || true

    # SPIKE Nexus workload
    /opt/spire/bin/spire-server entry create \
      -socketPath "$SOCK" \
      -parentID spiffe://agentic-ref-arch.poc/agent/k8s-psat \
      -spiffeID spiffe://agentic-ref-arch.poc/ns/spike-system/sa/spike-nexus \
      -selector k8s:ns:spike-system \
      -selector k8s:sa:spike-nexus \
      -dns spike-nexus \
      -dns spike-nexus.spike-system.svc.cluster.local \
    || true

    echo ""
    echo "=== Current entries ==="
    /opt/spire/bin/spire-server entry show -socketPath "$SOCK"
    echo ""
    echo "Done."
