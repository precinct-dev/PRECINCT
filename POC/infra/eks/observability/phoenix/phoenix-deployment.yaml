# ------------------------------------------------------------------------------
# Phoenix Deployment
# Story: RFA-9fv.7
#
# Deploys Arize Phoenix for trace visualization and analysis in the
# observability namespace. Phoenix receives OpenTelemetry traces via gRPC
# and provides a web UI for operators to inspect:
#   - Top blocked tools / destinations
#   - Step-up gating rate and reason codes
#   - Deep scan backlog and false-positive rates
#   - Tool hash mismatch events (potential rug-pulls)
#   - "Sensitive read -> external send" near-misses
#
# Key design decisions:
#   - Persistent volume for trace storage (data survives pod restarts)
#   - Port 6006 for UI, port 4317 for gRPC trace ingestion
#   - Non-root execution with writable data directory via PVC
#   - Resource limits appropriate for POC workloads
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: observability
  labels:
    app.kubernetes.io/name: phoenix
    app.kubernetes.io/part-of: mcp-observability
    app.kubernetes.io/component: trace-viewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: phoenix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: phoenix
        app.kubernetes.io/part-of: mcp-observability
        app.kubernetes.io/component: trace-viewer
    spec:
      serviceAccountName: phoenix
      terminationGracePeriodSeconds: 15
      containers:
        - name: phoenix
          image: arizephoenix/phoenix:latest
          ports:
            - name: http-ui
              containerPort: 6006
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
          env:
            - name: PHOENIX_PORT
              value: "6006"
            - name: PHOENIX_HOST
              value: "0.0.0.0"
            - name: PHOENIX_GRPC_PORT
              value: "4317"
            # Store traces on persistent volume
            - name: PHOENIX_WORKING_DIR
              value: "/data"
          livenessProbe:
            httpGet:
              path: /
              port: http-ui
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http-ui
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            # Persistent storage for trace data
            - name: phoenix-data
              mountPath: /data
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Phoenix needs to write to its data dir
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: phoenix-data
          persistentVolumeClaim:
            claimName: phoenix-data
---
# PersistentVolumeClaim for Phoenix trace storage
# Uses the default StorageClass (gp3 on EKS). Adjust size for production.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: phoenix-data
  namespace: observability
  labels:
    app.kubernetes.io/name: phoenix
    app.kubernetes.io/part-of: mcp-observability
    app.kubernetes.io/component: trace-viewer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
