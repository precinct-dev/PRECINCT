# ------------------------------------------------------------------------------
# Gateway ConfigMap
# Story: RFA-9fv.4
#
# Contains OPA policies and tool registry configuration for the MCP Security
# Gateway. These files are mounted into the gateway pod at /config/.
#
# In production, these would be managed by a CI/CD pipeline that updates the
# ConfigMap from the source of truth in config/opa/ and config/tool-registry.yaml.
#
# This manifest is a TEMPLATE. The Makefile "deploy" target generates the actual
# ConfigMap from the source files using:
#   kubectl create configmap gateway-config --from-file=...
#
# The declarative version below shows the structure; the Makefile approach
# ensures the ConfigMap always matches the committed policy files.
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: gateway
  labels:
    app.kubernetes.io/name: mcp-security-gateway
    app.kubernetes.io/part-of: mcp-security-gateway
    app.kubernetes.io/component: config
data:
  # OPA policies and data files are loaded from config/opa/ at deploy time.
  # The Makefile uses --from-file to populate this ConfigMap with:
  #   opa/mcp_policy.rego
  #   opa/ui_policy.rego
  #   opa/ui_csp_policy.rego
  #   opa/exfiltration.rego
  #   opa/context_policy.rego
  #   opa/tool_grants.yaml
  #   opa/ui_capability_grants.yaml
  #   tool-registry.yaml
  #   capability-registry-v2.yaml
  #
  # Placeholder defaults keep the manifest self-contained for kustomize/kubeconform.
  # Production overlays should replace this ConfigMap from source policy files.
  mcp_policy.rego: |
    package gateway.authz
    default allow := false
  ui_policy.rego: |
    package gateway.ui
    default allow := true
  ui_csp_policy.rego: |
    package gateway.ui_csp
    default allow := true
  exfiltration.rego: |
    package gateway.exfiltration
    default deny := false
  context_policy.rego: |
    package gateway.context
    default allow_context := true
  tool_grants.yaml: |
    tool_grants: []
  ui_capability_grants.yaml: |
    grants: []
  tool-registry.yaml: |
    tools: []
  capability-registry-v2.yaml: |
    capability_grants: []
