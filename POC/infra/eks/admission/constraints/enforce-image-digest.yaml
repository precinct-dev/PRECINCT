# ------------------------------------------------------------------------------
# Constraint: enforce-image-digest
# Story: RFA-9fv.9
#
# Applies the RequireImageDigest ConstraintTemplate to enforcement-critical
# namespaces. All container images deployed to these namespaces must use
# digest-pinned references -- floating tags like :latest are rejected.
#
# Enforcement namespaces (from Reference Architecture):
#   - mcp-gateway:    MCP Security Gateway
#   - mcp-servers:    MCP Tool Servers (S3, etc.)
#   - spike-system:   SPIKE/SPIFFE identity system
#   - spire-system:   SPIRE server and agents
#   - policy-system:  OPA bundle server and policy engine
#
# Examples of valid vs invalid image references:
#   VALID:   ghcr.io/org/gateway@sha256:abc123def456...
#   INVALID: ghcr.io/org/gateway:latest
#   INVALID: ghcr.io/org/gateway:v1.0
#   INVALID: nginx  (implicit :latest, no registry, no digest)
#
# Rejection behavior:
#   - Pod/Deployment admission is DENIED with a clear error message
#   - Rejection events are created and visible via kubectl get events
#   - Audit mode can be enabled by setting enforcementAction: dryrun
#
# Reference Architecture Section 10.5.1: Pinned artifacts
# ------------------------------------------------------------------------------
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: RequireImageDigest
metadata:
  name: enforce-image-digest
  labels:
    app.kubernetes.io/part-of: mcp-admission-control
    app.kubernetes.io/component: supply-chain-security
  annotations:
    description: >-
      Enforces digest-pinned image references for all containers in
      security-critical namespaces. Floating tags are rejected.
spec:
  # deny = reject admission; dryrun = log but allow (for rollout)
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "ReplicaSet", "StatefulSet", "DaemonSet"]
      - apiGroups: ["batch"]
        kinds: ["Job", "CronJob"]
    namespaces:
      - mcp-gateway
      - mcp-servers
      - spike-system
      - spire-system
      - policy-system
  parameters:
    exemptImages:
      # Kubernetes pause container (injected by kubelet, not user-controlled)
      - "registry.k8s.io/pause*"
      - "602401143452.dkr.ecr.*.amazonaws.com/eks/pause*"
