# ------------------------------------------------------------------------------
# TLS Secret for policy-controller webhook
# Story: RFA-7bh.2
#
# The policy-controller webhook communicates over HTTPS with the K8s API
# server. This secret holds the TLS certificate and key.
#
# In production: Use cert-manager to auto-generate and rotate TLS certs.
# For local development: A self-signed certificate Job generates this secret
# (see tls-cert-generator.yaml in the local overlay).
#
# The ValidatingWebhookConfiguration's caBundle must match the CA that
# signed this certificate.
#
# Reference Architecture Section 10.5.1: Supply Chain Beyond Model Weights
# ------------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: policy-controller-webhook-tls
  namespace: cosign-system
  labels:
    app.kubernetes.io/name: policy-controller
    app.kubernetes.io/part-of: sigstore-policy-controller
type: kubernetes.io/tls
# Placeholder: actual TLS data is injected by cert-manager (production)
# or the tls-cert-generator Job (local development).
# Empty data here satisfies Kustomize build validation.
data:
  tls.crt: ""
  tls.key: ""
