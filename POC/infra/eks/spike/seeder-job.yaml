apiVersion: batch/v1
kind: Job
metadata:
  name: spike-secret-seeder
  namespace: spike-system
  labels:
    app.kubernetes.io/name: spike-seeder
    app.kubernetes.io/part-of: spike
spec:
  backoffLimit: 3
  # Keep artifacts long enough for demo-k8s proof collection.
  # demo/run.sh tears down namespaces after the demo; this TTL is only a
  # safety net in case teardown is skipped.
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spike-seeder
        app.kubernetes.io/part-of: spike
    spec:
      serviceAccountName: spike-seeder
      restartPolicy: Never
      containers:
        - name: spike-seeder
          image: ghcr.io/spiffe/spike-pilot:0.8.0
          command: ['/bin/sh', '-c']
          args:
            - |
              # POSIX sh only (image may not ship bash)
              set -eu

              echo 'spike-seeder: waiting for SPIKE Nexus (bootstrap may still be running)...'
              # Deterministic seeding: retry until Nexus is reachable and accepts writes.
              seeded=0
              i=1
              while [ "$i" -le 60 ]; do
                if spike secret put deadbeef value=test-secret-value-12345 >/dev/null 2>&1; then
                  seeded=1
                  break
                fi
                echo "spike-seeder: retry secret put ($i/60)" >&2
                sleep 5
                i=$((i + 1))
              done
              if [ "$seeded" -ne 1 ]; then
                echo 'spike-seeder: FAILED to seed secret ref=deadbeef' >&2
                exit 1
              fi
              echo 'spike-seeder: seeded ref=deadbeef'

              echo 'spike-seeder: creating gateway-read ACL policy'
              policy_ok=0
              i=1
              while [ "$i" -le 60 ]; do
                if spike policy create --name=gateway-read \
                  --path-pattern='.*' \
                  --spiffeid-pattern="^spiffe://${SPIKE_TRUST_ROOT}/ns/gateway/sa/.*" \
                  --permissions=read >/dev/null 2>&1; then
                  policy_ok=1
                  break
                fi
                echo "spike-seeder: retry policy create ($i/60)" >&2
                sleep 5
                i=$((i + 1))
              done
              if [ "$policy_ok" -ne 1 ]; then
                echo 'spike-seeder: FAILED to create gateway-read policy' >&2
                exit 1
              fi
              echo 'spike-seeder: done'
          env:
            - name: SPIFFE_ENDPOINT_SOCKET
              value: 'unix:///run/spire/sockets/agent.sock'
            - name: SPIKE_NEXUS_API_URL
              value: 'https://spike-nexus.spike-system.svc.cluster.local:8443'
            - name: SPIKE_TRUST_ROOT
              value: 'agentic-ref-arch.poc'
            - name: SPIKE_TRUST_ROOT_NEXUS
              value: 'agentic-ref-arch.poc'
            - name: SPIKE_TRUST_ROOT_PILOT
              value: 'agentic-ref-arch.poc'
          volumeMounts:
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
            # Deterministic ordering: this ConfigMap is created by spike-bootstrap
            # only after successful bootstrap completion. Making it a required
            # volume ensures the seeder Pod will not start until bootstrap is done.
            - name: spike-bootstrap-state
              mountPath: /etc/spike/bootstrap-state
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
        - name: spike-bootstrap-state
          configMap:
            name: spike-bootstrap-state
