# Kustomize resource group for SPIKE manifests (Nexus, Keeper, Bootstrap, Seeder)
# Added by RFA-7bh.1, extended by RFA-9k2, RFA-1qx, RFA-628
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  # Nexus
  - nexus-rbac.yaml
  - nexus-configmap.yaml
  - nexus-pvc.yaml
  - nexus-deployment.yaml
  - nexus-service.yaml
  # Keeper
  - keeper-rbac.yaml
  - keeper-service.yaml
  - keeper-deployment.yaml
  # Bootstrap
  - bootstrap-rbac.yaml
  # Seeder
  - seeder-rbac.yaml
  #
  # NOTE (RFA-q9tc): The bootstrap and seeder Jobs are intentionally NOT applied
  # via kustomize because they require SPIRE workload registration to have
  # completed first. The local `make k8s-up` target applies these jobs only
  # after running `make k8s-register-spire` to avoid confusing transient "Error"
  # pods from early job attempts.
  # NetworkPolicies
  - spike-networkpolicies.yaml
