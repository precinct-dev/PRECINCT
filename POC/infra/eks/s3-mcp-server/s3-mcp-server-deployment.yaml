# ------------------------------------------------------------------------------
# S3 MCP Tool Server Deployment
# Story: RFA-9fv.5
#
# Deploys the S3 MCP tool server in the "tools" namespace.
# This server implements the MCP JSON-RPC protocol for S3 access, providing:
#   - s3_list_objects: List objects in allowed buckets/prefixes
#   - s3_get_object: Read object content from allowed buckets/prefixes
#
# Key design decisions:
#   - Single replica for POC
#   - Uses IRSA for AWS credentials (no static keys)
#   - Allowlist enforced at application layer via ALLOWED_BUCKETS env var
#   - hostPath mount for SPIRE agent socket
#   - Non-root, read-only root filesystem
#   - Listens on port 8082 (distinct from Docker MCP server on 8081)
#
# SPIFFE ID: spiffe://precinct.poc/ns/tools/sa/s3-mcp-tool
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3-mcp-server
  namespace: tools
  labels:
    app.kubernetes.io/name: s3-mcp-server
    app.kubernetes.io/part-of: mcp-tools
    app.kubernetes.io/component: tool-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: s3-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: s3-mcp-server
        app.kubernetes.io/part-of: mcp-tools
        app.kubernetes.io/component: tool-server
    spec:
      serviceAccountName: s3-mcp-tool
      terminationGracePeriodSeconds: 10
      containers:
        - name: s3-mcp-server
          # Replace with the actual ECR image reference after building:
          #   image: <account-id>.dkr.ecr.<region>.amazonaws.com/s3-mcp-server:<tag>
          #
          # Build with:
          #   docker build -f docker/Dockerfile.s3-mcp-server -t s3-mcp-server .
          image: s3-mcp-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: jsonrpc
              containerPort: 8082
              protocol: TCP
          env:
            - name: PORT
              value: "8082"
          envFrom:
            - configMapRef:
                name: s3-mcp-server-config
          livenessProbe:
            httpGet:
              path: /health
              port: jsonrpc
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: jsonrpc
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            # SPIRE Agent Workload API socket (from host via DaemonSet)
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        # SPIRE Agent socket from the host (populated by SPIRE Agent DaemonSet)
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
