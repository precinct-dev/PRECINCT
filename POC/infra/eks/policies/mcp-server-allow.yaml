# ------------------------------------------------------------------------------
# MCP Server Allow NetworkPolicies
# Story: RFA-9fv.4
#
# Explicit allow rules for the MCP tool server (tools namespace).
# These rules layer on top of the default-deny policy to permit only the
# traffic flows required for tool servers to function:
#
#   INGRESS:
#     - From gateway namespace on port 8081 (JSON-RPC requests)
#       Tool servers can ONLY receive traffic from the gateway -- no direct
#       access from agents or other namespaces.
#
#   EGRESS:
#     - To kube-dns on port 53 (DNS resolution)
#     - All outbound traffic permitted (0.0.0.0/0)
#
#   NOTE: Egress is currently open to all destinations. MCP tool servers may
#   need to reach arbitrary external APIs, databases, and cloud services, and
#   we do not know each tool's requirements in advance. In production, this
#   should be replaced with a per-tool whitelist. See the TODO comment on the
#   egress rule below for specific recommendations.
#
# Reference Architecture Section 9.4:
#   "Tool pods can ONLY receive traffic from the gateway namespace"
# ------------------------------------------------------------------------------

# Allow inbound from gateway namespace only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-server-allow-ingress
  namespace: tools
  labels:
    app.kubernetes.io/part-of: mcp-tools
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-server
  policyTypes:
    - Ingress
  ingress:
    # Allow inbound ONLY from gateway namespace pods on port 8081
    - from:
        - namespaceSelector:
            matchLabels:
              name: gateway
          podSelector:
            matchLabels:
              app.kubernetes.io/name: mcp-security-gateway
      ports:
        - protocol: TCP
          port: 8081
        # NOTE(local overlay): demo mock MCP server listens on :8082
        - protocol: TCP
          port: 8082
---
# Allow tool server egress to DNS and all outbound destinations
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-server-allow-egress
  namespace: tools
  labels:
    app.kubernetes.io/part-of: mcp-tools
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-server
  policyTypes:
    - Egress
  egress:
    # Allow egress to kube-dns for DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow ALL outbound traffic for tool servers.
    #
    # TODO(production): Replace with a per-tool whitelist of external destinations.
    # MCP tool servers may need to reach arbitrary external APIs, databases,
    # and cloud services. We don't know in advance what each tool requires.
    # For now, we allow all egress and rely on application-layer controls.
    #
    # Production recommendation:
    #   1. Audit each tool's outbound dependencies
    #   2. Create per-tool NetworkPolicies with specific CIDRs/ports
    #   3. Use an egress proxy (e.g., Istio egress gateway) for logging
    #   4. Remove this permissive rule once whitelist is in place
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
