receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Add resource attributes for better observability
  resource:
    attributes:
      - key: service.namespace
        value: agentic-security-poc
        action: upsert

exporters:
  # Export to Phoenix for trace visualization
  otlp/phoenix:
    endpoint: phoenix:6006
    tls:
      insecure: true

  # Debug logging for development
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/phoenix, debug]

    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/phoenix, debug]

    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/phoenix, debug]

  telemetry:
    logs:
      level: info
