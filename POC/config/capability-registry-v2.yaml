# Capability Registry V2 (Phase 3)
#
# This file is the source-of-truth input for "capability registry v2" in the POC.
# It is intentionally minimal today: the current gateway policy engines accept a
# path but do not yet parse/enforce this registry.
#
# Why it exists anyway:
# - K8s deployments mount this file into the gateway pod (see infra/eks/gateway).
# - Local kustomize overlays generate gateway-config ConfigMaps from real files.
# - Production implementations can extend this schema to include provider SLAs,
#   budgets, residency, endpoint attestation, protocol adapters, etc.
#
# Keep this YAML stable and human-readable; treat changes as a governed lifecycle
# (RuleOps/PolicyOps) once the parser/enforcement is implemented.
version: v2

capabilities:
  # Example tool-plane capability group (MCP). Not yet enforced.
  - id: tool.mcp.default
    kind: tool
    protocol: mcp
    server: default
    allowlist:
      - tavily_search

  # Example model-plane provider entry (OpenAI-compatible). Not yet enforced.
  - id: model.groq.openai_compat
    kind: model
    protocol: openai
    provider: groq
    endpoint: https://api.groq.com/openai/v1
    residency:
      - us

